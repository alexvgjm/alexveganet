					const element = document.currentScript.parentElement;

					const data = [null,{"type":"data","data":(function(a,b,c,d,e,f,g){a[0]="Personal";a[1]="Tooling";b[0]="Blizzard";c[0]="Tooling";c[1]="Three.js";c[2]="DX";d[0]="herramientas";d[1]="esperar";d[2]="Three";e[0]={title:"🔴 Caso de la suite Cosby",slug:"caso-suite-cosby",coverImage:"blizzard.jpg",coverPosition:"normal",coverAuthor:"Annie Nyle",excerpt:"Repaso algunas experiencias con este caso, implicados, nuestra postura y resultados.",date:"2024-10-06T13:00:23.177Z",updated:"2024-10-06T13:00:23.903Z",hidden:false,tags:a,keywords:b,type:"default",fullReload:false,path:"/src/posts/caso-suite-cosby.md",html:"\u003Cdiv class=\"info-box svelte-16gsg44\"> No voy a centrarme en los hechos principales de este caso, sino en\nalgunos datos interesantes y relacionados con nuestra actividad, pero daré\nalgo de contexto adicional que no suele explicarse en otros artículos.\n\u003Cp style=\"margin-top: 0.5rem; line-height: 1.25rem; color: var(--color-second-light)\" data-svelte-h=\"svelte-ji7l8p\">AVISO: he escrito esto muy rápido en algo de rato libre, espera encontrar más de alguna errata o párrafo sobrecargado hasta que saque tiempo a revisarlo.\u003C/p> \u003C/div> \u003Cp data-svelte-h=\"svelte-1v099qf\">Ha pasado más de una década desde que se registró el primer incidente relacionado con uno de los tantos casos de acoso y abuso sexual que salieron a la luz en un periodo muy turbulento para la industria de los videojuegos. Este caso, conocido popularmente como el “Caso de la suite Cosby” o más formalmente como la “Demanda del Departamento de Igualdad en el Empleo y la Vivienda de California (DFEH, por sus siglas en inglés) contra Activision Blizzard”, se centró especialmente en la investigación de asuntos de acoso sexual, entre ellos el suicidio de Kerri Moynihan.\u003C/p> \u003Cp data-svelte-h=\"svelte-1tfbix5\">No me gusta la denominación formal, sentida como utilizada deliberadamente para reducir el alcance del problema a un asunto de jurisdicción local y de intereses variables. Un caso iniciado de esta manera es aprovechado por las corporaciones como parte de una estrategia a largo plazo, esperando que eventualmente caiga en manos de un gobierno más favorable. El DFEH, ahora renombrado como el Departamento de Derechos Civiles de California (CRD), tampoco está exento de polémica.\u003C/p> \u003Cp data-svelte-h=\"svelte-sz4bo8\">En las corporaciones, el “non bis in idem” (“no dos veces por lo mismo”, recogido en la mayoría de países de occidente en forma de artículo en constitución que otorga el derecho a no volver a ser juzgado por la misma causa), es usado como una herramienta más. Permite elegir el momento oportuno para ser juzgado por algo indefendible, ante la entidad más conveniente, en el lugar más adecuado y con el mayor número de acusaciones posibles de golpe. Así, se minimiza cualquier impacto sobre la corporación y se intenta resolver todo en un único proceso.\u003C/p> \u003Cp data-svelte-h=\"svelte-10od9ci\">Sin ánimo de quitar hierro al asunto, la suite Cosby era una conveniente portada\npara una gigante montaña de denuncias y toxicidad que habían creado un\nentorno de alta “fluidez laboral”, una forma de decir que nadie quería trabajar\nahí y que había ciclado la mayoría de la plantilla, no quedando ni una cuarta\nparte de la Blizzard original ni sus ideas. El caso de la Suite Cosby era lo\nbastante mediático para ser la punta de lanza en una demanda, y lo\nsuficientemente barato de solucionar.\u003C/p> \u003Cp data-svelte-h=\"svelte-yeweyb\">Pero la demanda de la DFEH no parece haber sido la idónea para\nActivision Blizzard,\nsino una escala inevitable tras el insulto inicial propuesto por la Comisión de\nOportunidad y Empleo Igualitario (EEOC, del inglés), de ofrecer una indemnización\nde unos $18 millones, a repartir entre todos los empleados en plantilla entre\n2016 y 2021. Unos 10000 empleados, incluyendo hombres y mujeres 🤷‍♂️.\nCon un reparto igualitario como el que se proponía, correspondía a $1800 dólares\npor empleado en acuerdo llevado mediante decreto de consentimiento.\u003C/p> \u003Cp data-svelte-h=\"svelte-1j91agc\">Si eso no suena lo suficientemente absurdo, para el cálculo de los\n18 millones solo se tuvo en cuenta el número de empleados que aceptaron y\nparticiparon en el acuerdo con la EEOC, que como imaginarás ante las\ncondiciones, no fueron precisamente muchos.\u003C/p> \u003Cp data-svelte-h=\"svelte-1t5iwwv\">Probablemente te preguntes a cuántos hombres acosaron sexualmente durante\nese tiempo. No se filtró esa información en detalle, pero muy probablemente\na pocos por no decir ninguno. La EEOC generalizó y metió todas las demandas\nlaborales en un mismo saco, incluyendo las de acoso sexual, de forma que, muy\nconveniente para Activision Blizzard, solventarían todos sus problemas de golpe.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-ux6muo\">Antisindicalismo y estado\u003C/h2> \u003Cp data-svelte-h=\"svelte-rnggeo\">Lo anterior es difícil de comprender para mucha gente, ¿cómo una agencia federal\nque se hace llamar “Comisión de Oportunidad y Empleo Igualitario” parece hacer\ntodo lo contrario y guiar\nhacia una salida fácil a una corporación que parece atentar contra sus\nempleados?\u003C/p> \u003Cp data-svelte-h=\"svelte-1m1gxox\">Por qué, si mientras Bobby Kotick soltaba bonitas palabras vacías para sus empleados (y\nalgunas otras no tan bonitas), Activision Blizzard no coopera y\ndestruye pruebas que le son requeridas durante la investigación.\u003C/p> \u003Cp data-svelte-h=\"svelte-8hnozm\">Esto se explica porque mientras prometen proteger a sus empleados, también\ncontratan a las mejores firmas\nantisindicalistas del mundo, como lo es WilmerHale, muy conocida por su brutal\neficiencia para erradicar cualquier indicio de sindicalismo en Amazon.\u003C/p> \u003Cp data-svelte-h=\"svelte-vh89vv\">Y aunque parezca no tener relación, lo que hace verdaderamente fuertes a las\nfirmas como WilmerHale, más allá de su capacidad para impedir la unión, es que\ntienen una increíble conexión con los servicios públicos. No solo hacen\nsu labor impecablemente, también lo hacen afianzando relaciones y haciendo de\npuente entre las corporaciones y los poderes federales, incluyendo el judicial.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-zfujpo\">Nuestra postura\u003C/h2> \u003Cp data-svelte-h=\"svelte-sagetj\">En 2021, unos días antes de explotar públicamente todo este caso, poco antes\ndel lanzamiento de Diablo 2 Resurrected, mi compañero Cristo Santana y yo\ntrabajábamos en un generador de sitios estáticos minimalista para realizar una\nherramienta para la comunidad.\u003C/p> \u003Cp data-svelte-h=\"svelte-13j8ias\">El proyecto, \u003Ca href=\"https://d2runewords.com\" rel=\"nofollow\">D2Runewords\u003C/a> \u003Cem>(Diablo 2 rune words, con palabras juntas de forma\ndeliberada por SEO)\u003C/em>, nació casi a la misma vez que se publicó todo este asunto\nde manera masiva. En ese instante\nqueríamos dejarlo de lado, pero finalmente pensamos en algo mejor:\ndejar una nota de disconformidad. Es lo mínimo que podíamos hacer, manifestar\nnuestro descontento.\u003C/p> \u003Cp data-svelte-h=\"svelte-otk5si\">Hasta ahí pensábamos que no iba a pasar nada más, una web desconocida y no\nposicionada recientemente creada que solo servía de herramienta y base de datos\npara la comunidad de un juego relativamente nicho, seguramente sería irrelevante.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-15pgp9u\">¿Sirvió de algo?\u003C/h2> \u003Cp data-svelte-h=\"svelte-15m4iaq\">Probablemente no cambió nada en absoluto, pero si solo sirvió para que alguna\npersona, aunque fuera por un momento, se sintiera apoyada, nos es suficiente.\u003C/p> \u003Cp data-svelte-h=\"svelte-fd3vki\">En más de tres años y medio hemos recibido feedback directo de solo nueve\npersonas, de las cuales dos agradecieron la herramienta en sí sin mencionar al\ntema. Entre las siete restantes se encontraba una empleada\nde Activision Blizzard con un mensaje algo agridulce:\u003C/p> \u003Cblockquote data-svelte-h=\"svelte-1h14obb\">\u003Cp>Dear Alex and Cristo,\u003C/p> \u003Cp>on behalf of my entire team, we want to express our sincere gratitude for your support.\u003C/p> \u003Cp>Unfortunately, it’s not as simple as you suggest to detach ourselves from this company. For\nmany of us, working here was once a dream. Yet now, it feels more like a nightmare we wish\nwe could escape, if only there were better opportunities.\u003C/p> \u003Cp>The work itself is demanding, but what makes it truly difficult is the knowledge that our\nefforts go unrecognized. This is the company’s greatest problem.\u003C/p> \u003Cp>We wish you all the best.\u003C/p> \u003Cp>Sincerely,\u003C/p> \u003Cbr>-omito su nombre y rol, por prudencia-\u003C/blockquote> \u003Cp data-svelte-h=\"svelte-1hplq84\">De los seis restantes, tres no se habían enterado de qué iba el tema y pedían\nmás información. Un mensaje que me gustó mucho fue el de Thomas Giuseppe, quien\nposteriormente también contribuyó mucho a dar a conocer la herramienta:\u003C/p> \u003Cblockquote data-svelte-h=\"svelte-c4jdxq\">\u003Cp>Hey!\u003C/p> \u003Cp>I just found d2runewords.com, and I think it’s an awesome tool. Basically, it’s the only one\nwhere I can mark what runes I have and clearly see what I can make with them.\u003C/p> \u003Cp>But I don’t really get the message in the header. I think I’m missing some context, but it\nsounds serious. Would it be too much to ask if you could explain what it’s about?\u003C/p> \u003Cp>Thanks!,\u003Cbr>\nGiu\u003C/p>\u003C/blockquote> \u003Cp data-svelte-h=\"svelte-12vt2dj\">Gracias a él nos dimos cuenta de que era importante dejar una referencia al caso\nen el mensaje. Parecía que la mayoría ni se había enterado de nada.\u003C/p> \u003Cp data-svelte-h=\"svelte-98c51j\">La página registraba en sus mejores momentos unas 12.000 visitas recurrentes\nal mes y unas 300 visitas únicas mensuales (de nuevos usuarios). La diferencia\ntan grande entre visitas recurrentes y únicas se debe a que\nal tratarse de una webapp herramienta/base de datos, los usuarios\nla guardan en marcadores y la consultan regularmente.\u003C/p> \u003Cp data-svelte-h=\"svelte-sjk0ik\">Hemos visto la página aparecer entre algún streaming de Diablo 2, así que estamos\nconvencidos de que al menos hemos contribuido con un poco más de visibilización.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-7bymre\">¿Cómo está la situación actualmente?\u003C/h2> \u003Cp data-svelte-h=\"svelte-810671\">En un correo que no consideramos de feedback, nos preguntaron si la situación\nha mejorado. Lamentablemente no tenemos contacto con ningún empleado. Me he\ndistanciado mucho del tema, por lo que me es imposible responder a esa pregunta.\u003C/p> \u003Cp data-svelte-h=\"svelte-1f3w6xr\">Sinceramente soy muy poco optimista, pero me alegra ver cómo algo tan simple\ncomo mantener un mensaje puede incomodar a algunas personas y hacer sentir\napoyadas a otras aunque sea un sentimiento fugaz o considerablemente inútil.\u003C/p> \u003Cp data-svelte-h=\"svelte-1qurh8p\">Respecto al uso de la herramienta, en realidad no me sienta mal que se use\ny sea útil, no juzgo a nadie por jugar a ningún juego de esta compañía y menos\na Diablo 2, que se comió la mitad de mi adolescencia.\u003C/p> \u003Cp data-svelte-h=\"svelte-2u7g7e\">Diablo 2 fue un juego de una\nBlizzard en la que sin lugar a dudas también\nexistía una toxicidad destacable, pero también una cultura que, bajo la\ndirección de Morhaime reconocía la calidad y trabajo de sus empleados ante\ntodo, o eso es lo que se suele decir. Yo prefiero no poner más la mano en el\nfuego por ninguna empresa ni sus caras visibles.\u003C/p>",relatedPosts:[{title:"Autonomía y ajenidad (parte 1)",slug:"autonomia-ajenidad-1",coverImage:"starfish.jpg",coverPosition:"normal",coverAuthor:"Pedro Lastra",excerpt:"El trabajador autónomo no existe y el trabajo no es un orgullo.",date:"2024-08-24T13:06:23.177Z",updated:"2024-08-24T13:06:23.903Z",hidden:false,tags:["Personal","Laboral","Software libre"],keywords:["trabajo","autónomo"],type:"default",path:"/src/posts/autonomia-ajenidad-1.md",html:"\u003Cp data-svelte-h=\"svelte-1wpyji2\">Opinión algo impopular: el trabajador autónomo no existe y el trabajo no es un\norgullo. Iré por partes en esta entrada que repasa algunos\nconceptos que se consideran importantes en la enseñanza de formación\nprofesional pero no en la universidad 🤷‍♂️.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-3yagm2\">El autónomo no existe\u003C/h2> \u003Cp data-svelte-h=\"svelte-10a7wn3\">Siempre que digo que soy autónomo se me escapa una carcajada. ¿Cómo puede alguien\nconsiderarse autónomo si necesita permiso y pagar para serlo?\nLa única diferencia es que tu jefe es un ente inflexible y abusivo llamado estado,\nque concentra poderes contra los que no puedes luchar de manera individual.\u003C/p> \u003Cp data-svelte-h=\"svelte-18geujv\">Un estado lleno de autónomos es un sueño húmedo para el poder. Personas que viven\nen la falsa creencia de tener control sobre su vida laboral, rehuyendo de la\ncooperación y defensa laboral colectiva, bajando la cabeza porque:\u003C/p> \u003Cul data-svelte-h=\"svelte-1qdhirk\">\u003Cli>Ya conocía los términos y los aceptó: “es lo que toca” suele pensar.\u003C/li> \u003Cli>Sabe que de forma individual no tiene ningún poder y que salvo sectores muy\nconcretos la huelga es inefectiva y solo dará paso a otros autónomos oportunistas.\u003C/li> \u003Cli>Cree que los sindicatos no le apoyarán. Probablemente debido a que los sindicatos\nde autónomos son un chiste.\n\u003Cul>\u003Cli>A ver, si te presentas usando la palabra “autónomo” ante la CNT se reirán en tu cara mientras te señalan al edificio de hacienda más cercano, pero eso no significa que no te consideren un trabajador ni vayan a pasar de ti. Otra cosa es que puedan conseguir algo.\u003C/li>\u003C/ul>\u003C/li> \u003Cli>Se vuelve parte de uno el quejarse de hacienda y cuánto le están reventando. Es como la vieja que presume de dolencias ante la vecina, el clásico “qué bien tan mal / qué mal tan bien”.\u003C/li>\u003C/ul> \u003Cp data-svelte-h=\"svelte-t4skty\">Yo no me libro, e intento convencerme cada día de que al menos tengo libertad\npara mandar al carajo al cliente o lo que esté haciendo y ya, sin ninguna carga\nde responsabilidad.\u003C/p> \u003Cp data-svelte-h=\"svelte-z8tuyy\">En teoría, un trabajador asalariado goza de la misma libertad: una relación laboral exige\nvoluntariedad \u003Csmall>(discutible con excepciones de servicios públicos ante\nemergencias nacionales de extrema necesidad, como el caso de bomberos o\nsanitarios)\u003C/small>, así que, en teoría\nla mayoría puede mandar al carajo su trabajo cuando quiera (xd…).\u003C/p> \u003Cp data-svelte-h=\"svelte-11u0qik\">La voluntariedad en el contexto del derecho laboral en la relación laboral\nsignifica que nadie puede obligarte a trabajar (en teoría ni el estado). En ese\nsentido el trabajo tiene carácter voluntario (que no significa no remunerado). Claro,\nigual de voluntario que comer, e igual de voluntario que pagar un alquiler.\nIgual de voluntario que no rajarse las venas.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1afsrt5\">La ajenidad\u003C/h2> \u003Cp data-svelte-h=\"svelte-15gqcak\">Me he críado escuchando un conjunto de falacias\nfundamentada en una especie de incoherente orgullo obrero, que en algún\nmomento acabé interiorizando como algo racional: “yo tengo X años cotizados”,\n“yo llevo trabajando desde los 15 años”, “tú no sabes lo que es trabajar”, etc.\u003C/p> \u003Cp data-svelte-h=\"svelte-19ha8i3\">Yo solo escucho “he intercambiado X tiempo de mi vida por dinero y la promesa\nde más dinero”. Y no cualquier tiempo de su vida, sino de su juventud. Esto\nni siquiera se puede tildar de reduccionista.\u003C/p> \u003Cp data-svelte-h=\"svelte-80o8sg\">No entiendo cómo algunos casos que son claros\nsignos de sumisión son considerados dignos de orgullo. Veo gente\npasando años trabajando para una empresa para la que solo es un recurso,\nun trozo de carne o engranaje en su máquina de hacer dinero, y que muestran con orgullo los\ndías cotizados como si fuera ejemplo de disciplina o autodesarrollo, una\ncicatriz de una épica batalla ganada. Eso mientras viven\nen la realidad consumista desenfrenada de un capitalismo predatorio donde\nno están construyendo ningún futuro y donde están igual que como empezaron,\nsalvo que con media vida convertida a promesas de una pensión.\u003C/p> \u003Cp data-svelte-h=\"svelte-1kcl7s\">Y tengo un serio problema con eso. Concretamente con la ajenidad. Cuando la\npatronal describe la ajenidad puede hacerlo de una forma tan bonita como:\u003C/p> \u003Cp data-svelte-h=\"svelte-1l9qmbt\">“Exención al trabajador de las consecuencias directas de su labor, de sus costos\ny riesgos de la producción, recibiendo un salario en contraprestación de su esfuerzo”.\u003C/p> \u003Cp data-svelte-h=\"svelte-1y06dud\">Cuando podría resumirse en: “los frutos del trabajo solo pertenecen al empleador”\ny que yo extiendo con “y no importa si el trabajador realiza una actividad creativa\ncon la que el empleador va a seguir cobrando toda su vida. Se paga por su esfuerzo\npresente limitado a la duración de la relación laboral.”\u003C/p> \u003Ch3 data-svelte-h=\"svelte-98m34g\">La ajenidad en los trabajos creativos\u003C/h3> \u003Cp data-svelte-h=\"svelte-v7iwr3\">El problema de la ajenidad es que viene acompañado de cadenas para tu\ncerebro cuando se trata de un desarrollo creativo. Cadenas que permanecen\ntras el cese de la relación laboral.\u003C/p> \u003Cp data-svelte-h=\"svelte-cs5hk7\">En realidad, el empleador no es solo dueño de las consecuencias del trabajo\ny sus frutos, es dueño del trabajo en sí mismo y de una parte de ti. Ejemplo:\ncomo desarrollador de herramientas y metodologías custom, se te ocurre alguna\ncosita en tu actividad laboral que facilita muchos procesos y ayuda al resto\ndel equipo, algo muy común en el trabajo de un experto en Developer Experience\no un enablement engineer.\u003C/p> \u003Cp data-svelte-h=\"svelte-19jdwc4\">Consideras que tu desarrollo podría ser igual de útil para otros profesionales\no empresas, así que lo publicas por tu cuenta aportando a la comunidad. Al final\nsale de tu cabeza, ¿no? Pues no. Saldrá de tu cabeza, pero te han pagado un\nsalario para que la tengas pudriéndose en ella.\u003C/p> \u003Cp data-svelte-h=\"svelte-17ozwnn\">De pronto, ya no tienes solo un jefe, tienes a un maestro de esclavos que te\ndice qué puedes hacer o no con tu investigación y tus ideas, porque en el fondo\nno son tuyas, amenazando con poderes judiciales si quieres\ntan solo compartirlo altruistamente, ya no digamos monetizarlo por tu cuenta.\u003C/p> \u003Cp data-svelte-h=\"svelte-1otmt5n\">La acusación más típica y mínima es que tu idea puede o pudo dar una ventaja\nfrente a la competencia mientras se te pagó por ello y que si tú la estás\nexponiendo, estás apoyando a dicha competencia. Acusaciones relacionadas a\nla concurrencia desleal \u003Csmall>(la palabra concurrencia no implica “mientras\ntrabajas en”. Da igual si esto ocurre tras finalizar contrato).\u003C/small>\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1ronoj4\">Anarcosindicalismo y cooperativas\u003C/h2> \u003Cp data-svelte-h=\"svelte-1wysd81\">Me duele, mucho, pero he de reconocer que entre los franceses hay algunos\nde los mejores ejemplos recientes que nos ha brindado la humanidad. No hablo\nde Gojira, que también, sino en este contexto laboral, de Motion Twin.\u003C/p> \u003Cp data-svelte-h=\"svelte-aa3yu9\">Es la empresa que más uso como ejemplo de increíble modelo de desarrollo de\nsoftware, tooling y videojuegos. Eso al margen de sus tendencias políticas o\nsu organización laboral (al menos en sus inicios), que comentaré luego.\u003C/p> \u003Cp data-svelte-h=\"svelte-ilbqh8\">Este grupo de colegas centraba su trabajo en el desarrollo de juegos usando\nAdobe Flash. Entre ellos se encontraba Nicolas Cannasse desarrollando un\nlenguaje de alta abstracción y extremadamente orientado a multiplataforma\ndesde 2005.\u003C/p> \u003Cp data-svelte-h=\"svelte-1lolwil\">Cuando Flash murió ya tenían más que pulido su lenguaje Haxe y casi una década\nde iniciado su propio motor de renderizado/videojuegos, Heaps.io.\u003C/p> \u003Cp data-svelte-h=\"svelte-j76t9r\">Con eso, trabajando con sus propias herramientas de la manera que a ellos les\ngustaba, desarrollaron la joya de Dead Cells, con más de 10 millones de copias\nvendidas sin contar DLCs. Y creo que sin tener en cuenta las más de 5 millones\nen su versión Android ni la asociación con plataformas estilo Netflix.\u003C/p> \u003Cp data-svelte-h=\"svelte-t95qk\">Siendo un juego que no frecuenta ofertas de bundles a precios regalados ni\nnada similar, al multiplicar verás que hablamos de millones facturados (incluso\naunque solo costase 50 céntimos). Para\nun pequeño equipo de 8 personas creo que da suficiente para unas cuantas vidas.\nPero hay otras cosillas interesantes:\u003C/p> \u003Cul data-svelte-h=\"svelte-1dshv2p\">\u003Cli>Se describen como una cooperativa de trabajadores (puedes leer las descripciones\nen su propia página, dentro de una pedazo de estrella roja). En entrevistas no\nhablan precisamente pocas veces de cooperativa anarcosindicalista.\n\u003Cul>\u003Cli>Importante aclarar que el tiempo ha transcurrido y han fundado otro\nestudio anexo que se aleja de esta perspectiva.\u003C/li>\u003C/ul>\u003C/li> \u003Cli>Sus herramientas principales son libres y compartidas con la comunidad. Cualquier\npersona que las tenga dispone de las cuatro libertades fundamentales\ndel software libre y de código abierto. Comprenden que el éxito de un videojuego como producto\nartístico está vinculado al cómo se usan las herramientas y no a la posesión\nde las mismas. Podríamos considerar a las herramientas como\nel medio de producción.\u003C/li>\u003C/ul> \u003Cdiv class=\"info-box svelte-16gsg44\"> \u003Cp data-svelte-h=\"svelte-1rd2zn1\">NOTA: Dead Cells no es libre, es software privativo. No entraré en el \ndebate de si un videojuego debe ser libre para que sea ético porque en años no\nhe conseguido tener una posición clara al respecto. Podría considerar que es \nsuficiente que las herramientas que permiten su elaboración lo sean, pues las \nramas artísticas sufren demasiado en nuestro modelo económico como para \nsimplemente liberar los resultados del trabajo creativo enfocado a \nentretenimiento, y más siendo el trabajo de toda una vida.\u003C/p> \u003Cp data-svelte-h=\"svelte-1qmx001\">En todo caso, considero \nque como parte vital de la cultura deben ser más accesibles, pero en estos \ncontextos lamentablemente libre y accesible significa también gratis para la \nmayoría dada la libertad de libre distribución.\u003C/p> \u003C/div> \u003Cp data-svelte-h=\"svelte-19gb4g2\">Han hecho muchas cosas bien, ¿pero se salvan de algo? Las cooperativas fomentan\nel carácter asociativo y el rechazo a una organización vertical\ny jerarquías de poder en el contexto laboral, con una única excepción: el estado.\nNinguna diferencia con el supuesto autónomo, más allá de posibles “beneficios”\nfiscales pasados ciertos umbrales. El beneficio de pagar un poquito menos al\nestado soberano, que repartirá sabiamente el dinero entre ayuntamientos para\ncubrir necesidades esenciales, como organizar conciertos de Camela si fuera\nEspaña.\u003C/p> \u003Cp data-svelte-h=\"svelte-om5qlr\">En su caso además habrán tenido que bajar la cabeza con todo tipo de individuos\ny empresas abusivas como lo es Steam, llevándose hasta un posible 50%\npor distribución en su plataforma.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-18licbm\">Mi única condición en cualquier trabajo\u003C/h2> \u003Cp data-svelte-h=\"svelte-13wgyu3\">Tengo la ventaja de dedicarme a un área donde son las empresas las que te hacen\nla pelota, especialmente a la mínima que muestras algo de pasión y autonomía,\no en mi caso, un perfil obsesivo nada sano.\u003C/p> \u003Cp data-svelte-h=\"svelte-1r5k9wu\">A la mínima que destaques un poco lo raro es que no tengas a empresas de\nrecruiters o cazatalentos dando la turra con ofertas superbonitas y en\ndonde tú pones algunas condiciones (otra cosa es que las acepten).\u003C/p> \u003Cp data-svelte-h=\"svelte-1ao3ou8\">Lo único que solicito a esas empresas es la anulación de la ajenidad, aunque\neso implique a veces mayores responsabilidades o trabajar a puro equity. Todo mi\ntrabajo me pertenece, o al menos en una parte considerable como para no sufrir\nconsecuencias si quiero publicarlo bajo mis propias condiciones.\u003C/p> \u003Cp data-svelte-h=\"svelte-144nme8\">La mayoría se esfuma y no vuelven a contactarme en la vida, pero a veces cuela.\nHe conseguido algunos porcentajes por derechos de autor en software de la\nrama sanitaria con este modelo.\u003C/p> \u003Cp data-svelte-h=\"svelte-1fksa9d\">Si hago cuentas, muy probablemente esto me reporte bastante menos que haber\naceptado un contrato de asalariado, pero al menos tengo control sobre su destino. Y\nesto beneficia a la parte contratante, que no sería contratante\nsino socio. No solo reduce la responsabilidad fiscal, reduce los riesgos y los\ncostes al no contratar, también asegura una mayor implicación del\nprofesional que al final pasa a ser parte del proyecto y sus resultados, que se\npreocupará de su éxito porque de él depende su reputación y sus beneficios.\u003C/p> \u003Cp data-svelte-h=\"svelte-1koj3tz\">También existen empresas que en su modelo de desarrollo no tienen\nningún miedo y fomentan la publicación de herramientas y metodologías\nsabiendo que eso manifiesta una imagen de excelencia y seguridad en lo que hacen.\u003C/p> \u003Cp data-svelte-h=\"svelte-crdp6j\">A su vez mejoran las capacidades divulgativas y visibilizan a sus desarrolladores,\ngenerando al menos un ambiente de mayor crecimiento profesional.\nPese a la ajenidad, en ellas sabes que el trabajo que desarrollas al menos no\nestará anclado a nadie y hasta se te agradecería el divulgarlo.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-7u7yf2\">Esto no es solo mi trabajo\u003C/h2> \u003Cp data-svelte-h=\"svelte-171tqxj\">Al menos la parte de desarrollo propio,\ntooling y subnormaladas gráficas, seguiré haciéndolo me de o no dinero, incluso\npagaría si tuviera que hacerlo. Sobre la consultoría hablaré en otra entrada.\u003C/p> \u003Cp data-svelte-h=\"svelte-1eeo9ne\">La suerte de que mi hobby es especialmente\nrentable, y la mala suerte de vivir en una sociedad donde te llaman\n“nini” de manera peyorativa por no explotar el conocimiento\no habilidad, por no querer convertirme en carne para una corporación o por ver 20 años de\nretraso en el mundo académico y no querer tocarlo ni con un palo.\u003C/p> \u003Cp data-svelte-h=\"svelte-dnf6u\">En la segunda parte hablaré un poco más sobre mis intereses en\nun trabajo, pero adelanto que el último de ellos es el dinero (sin renunciar\na ello, tampoco soy tonto). Todos mis hobbies son baratos o gratuitos,\nno soy coleccionista de ninguna cosa y practico una filosofía minimalista\npor naturaleza, no es que lo fuerce. Mucho dinero tendrían que ofrecerme\npara conseguir verme tentado a trabajar en algo con lo que no esté cómodo.\u003C/p> \u003Cp data-svelte-h=\"svelte-1hxg1uq\">Me dice un colega “si no fueras tan vago, trabajarías menos”\n(no es una errata, es una frase con mucho sentido), pero es que se\nme hace un mundo hincar la rodilla, bajar la cabeza o pasar por el aro. Ya lo\nhice durante algunos años, moviéndome por miedo al juicio ajeno, por no\ndecepcionar y yendo en contra de mi naturaleza. Acabé consiguiendo lo contrario,\npetando de mala manera, aislándome, alejando y decepcionando a todos los que\nconfiaban en mí.\u003C/p> \u003Cp data-svelte-h=\"svelte-mgjb17\">Por otra parte cada vez tolero menos las normas y las jerarquías absurdas de\nlos ambientes corporativos y académicos. En el momento en el\nque un simplón me diga alguna incoherencia como que tengo que cumplir con\nun horario de trabajo “porque sí”, aunque eso fastidie mi productividad,\nperjudicándome a mí y a los objetivos de la empresa, me piraría a mi casa.\u003C/p>"},{title:"Deja de esperar por otros",slug:"deja-esperar-otros",coverImage:"jon-tyson.jpg",coverPosition:"normal",coverAuthor:"Jon Tyson",excerpt:"Hacerte tus propias herramientas puede acelerar tu trabajo, explico por qué.",date:"2024-09-13T13:00:23.177Z",updated:"2024-09-13T13:00:23.903Z",hidden:false,tags:c,keywords:d,type:"default",fullReload:false,path:"/src/posts/deja-esperar-otros.md",html:"\u003Cp data-svelte-h=\"svelte-c5t86c\">Hasta hace unos años me obsesionaba el tiempo, no me dejaba vivir en paz, siempre\nsentía que no había tiempo para nada y no disfrutaba ni de un mero paseo o de\nleer un libro. Irónicamente, me organizaba mucho peor que ahora.\u003C/p> \u003Cp data-svelte-h=\"svelte-pk5ahq\">En estos años, tras entender que es muy peligroso intentar controlar demasiado\nlos tiempos, cuando entendí que cada día con vida es una victoria y cada\narañazo del bruto de mi gato jugando es vida, el tiempo ya no forma parte de\nninguna ecuación. Si algo no llega a tiempo, pues no llega 🤷‍♂️.\u003C/p> \u003Cp data-svelte-h=\"svelte-197l6dv\">Esto puede sonar especialmente chocante en un consultor. A algunos clientes\ncuando me piden estimaciones de tiempo les digo “esto podría tomar un mes o un\naño, quién sabe”. Me miran raro, se supone que si alguien lo sabe soy yo.\u003C/p> \u003Cp data-svelte-h=\"svelte-ib4xxd\">No suelo infravalorar los factores no medibles y la experiencia me ha enseñado\na no estimar nunca por lo bajo, más vale que sobre el tiempo y darle una alegría\nal cliente al terminar mucho antes de lo previsto, a que falte y que el cliente\nse lleve una desagradable sorpresa, aunque eso suponga perder algunos clientes\ninicialmente a los que tu estimación les parece excesiva.\u003C/p> \u003Cp data-svelte-h=\"svelte-1euodzh\">Cuento esto porque el título de esta entrada podría hacer pensar que para mí\nes especialmente importante la productividad y no perder el tiempo, pero nada\nmás lejos de la realidad. Ahora bien, eso no significa que no haya notado una\nfuerte diferencia entre la productividad inherente a algunas metodologías.\u003C/p> \u003Cp data-svelte-h=\"svelte-zzi0ez\">Como frikazo del tooling y DX, sé muy bien que hacerte tus propias herramientas puede\nacelerar tu trabajo de una forma que no te puedes ni imaginar. Que quede muy claro cuanto antes: no me refiero a \u003Cstrong>reinventar la\nrueda\u003C/strong>. Tampoco lo considero el mal, reinventar tiene numerosas\nventajas y tengo mucho para hablar de ello en otra entrada, pero no, no es\nde esto de lo que trato aquí.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1tmvlw\">Caso real: luces de rotación libre en Three.js\u003C/h2> \u003Ccanvas class=\"three-example\" id=\"free-light-example-canvas\">\u003C/canvas> \u003Cbutton>Ocultar helpers\u003C/button> \u003Cp data-svelte-h=\"svelte-yx5zak\">Si estás en un dispositivo compatible \u003Csmall>(requiere navegador no muy viejo,\ncompatible con WebGL al menos)\u003C/small> estarás viendo una escena donde hay una\nluz direccional. Son fuentes de luz usadas para representar iluminación global\ndireccional plana, habitualmente un sol. Es una luz algo modificada respecto a\nla original. Describo luego.\u003C/p> \u003Cp data-svelte-h=\"svelte-w5qrkk\">Verás, en casi toda solución de renderizado 3D, los objetos\ntienen propiedades de rotación, normalmente asociados a una matriz de\ntransformación. Siempre se puede rotar todo objeto modificando esta propiedad\no bien mediante algún método rotate. En Three.js funciona igual.\u003C/p> \u003Cp data-svelte-h=\"svelte-10quyp6\">La primera experiencia de un alumno mío con Three.js fue nefasta. Me contó que tras una hora\nlo descartó y volvió a otras soluciones como Unity. Concretamente lo que le hizo\nabandonar es que no entendía por qué al rotar una “DirectionalLight” no cambiaba\nnada. El objeto que representa la luz, cambiaba, su matriz efectivamente era\nactualizada, pero no había cambio visible, porque la luz seguía apuntando a\ndonde quería (concretamente hacia la dirección 0,0,0).\u003C/p> \u003Cp data-svelte-h=\"svelte-zy0dfi\">En Three.js (hasta la fecha, release 168), por defecto, la rotación del objeto\nque representa a la fuente de luz es independiente de la dirección de la luz.\nLa luz se controla con la propiedad \u003Ccode>target\u003C/code>. Siempre apunta hacia un objetivo.\nPor defecto, hacia las coordenadas 0,0,0, osea, al centro de la escena.\u003C/p> \u003Cp data-svelte-h=\"svelte-1pb2lwd\">En realidad no supone ningún problema: moviendo el target puedes cambiar la\ndirección, y el target puede ser un objeto vacío invisible por la escena. De\nahí pueden surgir muchas opciones para realmente conseguir el efecto de rotación\nlibre.\u003C/p> \u003Cp data-svelte-h=\"svelte-f7k36c\">Aunque se topó con esto, se convenció de que no tenía sentido y que Three.js era\nsimplemente peor que otras soluciones, que no quería estar apagando fuegos,\nporque si con algo “tan básico” según él, ya había un obstáculo, ¿qué le\ndepararía el futuro? Atento a esto:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">const sun = new DirectionalLight('#ffffff', 2)\nsun.target.position.setZ(1)\nsun.add(sun.target)\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1hstxkr\">En este caso, \u003Ccode>sun\u003C/code> es una \u003Ccode>DirectionalLight\u003C/code> que como todas, siempre apunta a su\ntarget, no cambia, pero ahora el target es hijo de la luz (con add), y además\nestá en frente de ella (1 en Z, entiendo +Z como el frente). Así, al rotar\nsun también rotas el objeto target, haciendo que efectivamente la luz rote\nde manera acorde.\u003C/p> \u003Cp data-svelte-h=\"svelte-1xv2743\">¿Básicamente en 2 líneas hemos hecho que una luz rote acorde a su propiedad\nde rotación?, ¿de pronto tenemos luces como en Unity u otros sistemas? Esto no\nes precisamente un supertrabajo de ingeniería, pero muchos desarrolladores,\njuniors y seniors, tienden a creer que las cosas\nson más complejas de lo que realmente son y demasiadas veces a adoptar un rol\nde mero usuario.\u003C/p> \u003Cp data-svelte-h=\"svelte-12h2073\">Esto es común cuando no están acostumbrados a bibliotecas extensibles, libres y\nbien documentadas. Creen que lo que necesitan debe venir integrado en las\nbibliotecas que utilizan y se olvidan de que pueden extender cuanto quieran, e\nincluso contribuir con sus cambios si son muy útiles para alguien.\u003C/p> \u003Cp data-svelte-h=\"svelte-wynhgl\">Me gusta especialmente Three.js porque la mayoría de clases y funciones son\nbastante obvias. También porque es un entorno con tantos contribuidores\n(más de 800 a fecha de hoy) y tan laxo, que te ves estilos de diseño muy\ndistintos entre cada parte, haciéndolo muy “multicultural” a su manera.\u003C/p> \u003Cp data-svelte-h=\"svelte-1cjupe8\">Siguiendo con el ejemplo, podría abstraerse todo esto y hacer una nueva clase\nque herede de DirectionalLight:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">class RotableDirectionalLight extends DirectionalLight {\n    freeRotationTarget: Object3D\n\n    constructor(color: ColorRepresentation, intensity: number) {\n        super(color, intensity)\n        this.freeRotationTarget = new Object3D()\n        this.freeRotationTarget.setZ(1)\n        this.add(this.freeRotationTarget)\n        this.target = this.freeRotationTarget\n    }\n}\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1k1an1v\">Y así, cuando necesitemos una luz de rotación libre hacer:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">const sun = new RotableDirectionalLight(&#39;#ffffff&#39;, 2)\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-15mcduz\">Solo hay que tener cuidado con la propiedad target, si se modifica manualmente\nya deja de ser de rotación libre y actua como una direccional normal. Esto está\nbien, así puede servir de DirectionalLight cumpliendo el principio de sustitución\nde Liskov en su forma más pura. Guardamos una referencia al nuevo target con esta\nresponsabilidad, para poder restablecerlo en otro momento si se quiere recuperar\nla rotación libre.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-19g7tyv\">Independencia tecnológica\u003C/h2> \u003Cp data-svelte-h=\"svelte-1jgn7bv\">A lo mejor te preguntas por qué iba a querer alguien hacerse sus propias\nherramientas cuando ya existen soluciones similares, peor si piensas en la dichosa\nfrase de “reinventar la rueda”. Y puede que te preguntes cómo se supone que\ntodo esto puede ahorrar tiempo.\u003C/p> \u003Cp data-svelte-h=\"svelte-6lsf2o\">La siguiente respuesta se aplica con mayor notoriedad cuando eres un profesional\ncon mucha experiencia o formas parte de un equipo muy experimentado, que puede\ncrearse la herramienta adecuada en un momento o adaptar otra preexistente. Si\nno es así, probablemente te\nfatigue o incluso no sepas ni por dónde empezar por la mera falta de costumbre.\u003C/p> \u003Cp data-svelte-h=\"svelte-ab3ka0\">Cuando las soluciones existentes son privativas la ventaja es bastante obvia:\ntener libertad y completo control sobre tus herramientas, sin que una empresa de\nturno venga a decirte de pronto qué puedes o no puedes hacer y cuánto debes\npagarle. Además, el soporte a clientes de las herramientas privativas no es tan\nmaravilloso como muchos intentan defender. Te animo a intentar pedirle a Unity\nque solucione alguno de sus millones de problemas técnicos o mejore algunas\nde las herramientas más chapuceras que tiene (como las Unity Style Sheets).\nPor mucho que pagues una licencia, pasarán de ti.\u003C/p> \u003Cp data-svelte-h=\"svelte-1rp33dg\">Pero también es muy común hacerse uno mismo herramientas avanzadas pese a que\nexistan soluciones libres. No siempre uno está\ncontento con la arquitectura o el rumbo del proyecto por buenas que sean\nsus intenciones, y a veces está tan lejos\nde tus requisitos que sentirás que estarás más tiempo pidiendo ayuda y apagando\nfuegos que haciendo algo útil.\u003C/p> \u003Cp data-svelte-h=\"svelte-1g994jb\">Cuando no tienes que esperar por nadie para corregir un problema, sino que\npuedes ser tú mismo (o alguien de tu equipo) quien lo haga, con garantías de que\neventualmente se hará y exactamente como uno espera que se haga, no hay pausas\nsalvo las que tú decidas. Te aseguro que en este mundo se notan más las pausas\nque simplemente “ir lento”, no solo en el tiempo, también en la motivación.\u003C/p> \u003Cp data-svelte-h=\"svelte-gjgp1o\">Además, la complejidad de las características de bibliotecas, frameworks o\nsistemas de naturaleza\ngeneralista o multipropósito puede llegar a ser tan grande, que simplemente\nestudiarte la documentación y un uso básico se vuelve una pesadilla, siendo\nmás viable y habitualmente más eficiente hacerte una herramienta a medida o\nutilizar bibliotecas orientadas a una única responsabilidad.\u003C/p> \u003Cp data-svelte-h=\"svelte-6ydtym\">Three.js y PixiJS, por ejemplo, no son motores de videojuego, no tienen\nfísicas ni muchas otras herramientas, porque su rol principal es de renderizado.\nAdaptarlas a un sistema\nmás complejo implica también estudiarlas hasta el punto que más o menos puedes\nentender bien su arquitectura interna, así que te es muy fácil modificarlas\nsi lo necesitas.\u003C/p> \u003Cp data-svelte-h=\"svelte-vjyqrs\">En cualquier caso, el objetivo se puede resumir en buscar independencia. Entre más\ndependes de soluciones de terceros y entre más completas son sus soluciones,\nmenos margen de maniobra tienes cuando hay un problema serio con esa dependencia.\nHe visto a gente mantener issues en bibliotecas durante más de 5 años preguntando\ncada 3 meses “¿existe ya una solución?” y quejándose, cuando lo que piden se\npuede resolver en una tarde o dos.\u003C/p> \u003Cp data-svelte-h=\"svelte-11prgsj\">Por último y no menos importante hay otra razón para querer\nhacerte tus propias herramientas: por diversión o arte.\nEstoy algo cansado de los utilitaristas. Insisto mucho en que esto es un arte,\ny para muchos es nuestro hobby principal además de nuestra profesión. A veces\nsimplemente queremos intentar hacer algo por nuestra cuenta e intentar hacerlo\nmejor, sin desmerecer cualquier otra solución previa y sin ánimo de aportar nada\no competir. A veces es una oportunidad magnífica para mejorar.\u003C/p>"},{title:"Discursos segregacionistas",slug:"discursos-segregacionistas",coverImage:"valla.jpg",coverPosition:"normal",coverAuthor:"Alex Shuper",excerpt:"Recogiendo cable. Explico por qué no tolero ni en mí mismo algunos discursos.",date:"2024-09-07T22:06:23.177Z",updated:"2024-09-07T22:06:23.903Z",hidden:false,tags:["Personal","Salud mental"],keywords:[],type:"default",path:"/src/posts/discursos-segregacionistas.md",html:"\u003Cp data-svelte-h=\"svelte-1a38mrp\">En mi oficio es normal despertarse un día, ver código del día anterior y\npreguntarse: “¿Yo escribí esta porquería?“. Veo que no solo ocurre con código.\nAyer publiqué una entrada titulada “Primatología: directivos”. Ya no existe.\nSolo describía mi realidad trabajando\ncon directivos y no aportaba nada. No molaba ni el tono. ¿Primatología? Que\nsí, que somos todos unos monos, pero decirlo así suena tan pedante, tan esnob…\u003C/p> \u003Cp data-svelte-h=\"svelte-12mga9c\">He considerado que esa entrada era intolerable, y he reafirmado alguna que otra\nconvicción por el camino. Irónicamente, es la entrada que más feedback positivo\nha recibido; todos los compañeros que han tenido que lidiar con directivos sin\nformación técnica se han sentido muy identificados. ¿Mereció la pena?\u003C/p> \u003Cp data-svelte-h=\"svelte-1pbgmfd\">No pretendo ir de gurú y menos\nen estos ámbitos donde estoy a un palillo de ser un hikikomori, pero sí\ntengo claro qué cosas me sientan mal y\ncómo he aprendido a cargármelas sin dudar. Quizás mi experiencia le sirva a\nalguien.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-18r6i93\">🔴🤚 Discursos segregacionistas\u003C/h2> \u003Cp data-svelte-h=\"svelte-16n6dho\">Una de las ventajas de exponer lo que escribes es que, salvo que seas un\npsicópata al que le importa un pimiento lo que pueda producir, te estarás\npreguntando un buen tiempo si no la habrás cagado, liando a quien pueda leerte o\nmetiendo fuego innecesariamente.\u003C/p> \u003Cp data-svelte-h=\"svelte-jipa73\">Lo que escribí sobre los problemas de directivos o jefes de proyecto de\nsoftware sin conocimientos técnicos no era erróneo, pero era innecesario.\nEsos discursos que señalan a roles comunes, especialmente cuando los asocian a\nalgo negativo, suelen ser discursos segregacionistas si\nse publican a lo loco y se usan indebidamente. Si ese fuera mi objetivo\nestaría escribiendo en Linkedin o Twitter.\u003C/p> \u003Cp data-svelte-h=\"svelte-13vvo6n\">Si mi trabajo se fundamenta principalmente en unir, y si llevo toda la vida\nconociendo de primera mano los problemas de poner barreras entre las personas,\nel daño que provoca el mantener juicios inmutables por acciones pasadas, y un\nlargo etcétera, ¿qué pinto escribiendo algo así?\u003C/p> \u003Cp data-svelte-h=\"svelte-iluout\">Entre mis contactos no figuran directivos sin conocimiento técnico, ninguno va\na leerlo y sentirse mal. Pero yo sí lo leo, leo un texto que solo fortalece\nuna percepción negativa con un discurso donde realizo una generalización\napresurada. \u003Cem>\u003Csmall>He formado a siete directivos, solo siete (7) en todos estos años, y solo\ntres en el contexto de su entorno laboral, pero escribía esa entrada como si\nhubiera tratado a cientos con el mismo resultado.\u003C/small>\u003C/em>\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1nncrjc\">Dudar cuando guste\u003C/h2> \u003Cp data-svelte-h=\"svelte-1to1n8l\">Lo que hizo que se me encendieran las alarmas es la buena acogida de esa\nentrada. Ganar notoriedad por algo con lo que no te quieres ver reflejado es\nalgo que siempre he considerado aterrador.\u003C/p> \u003Cp data-svelte-h=\"svelte-dac09\">Tengo un problema que hace años manejaba de forma extraña. Implicaba esconder\ncualquier logro pasado\nindebidamente por connotaciones negativas que solo yo veía. Creía\nque si alguien me aplaudía algo de lo que yo mismo dudaba, eventualmente me\nacabaría sintiendo el triple de mal o pensando que cambiar de opinión\nme dejaría como un fraude.\u003C/p> \u003Cp data-svelte-h=\"svelte-1cyse93\">Hoy día le he encontrado un sentido más justificado. Me he topado\ndemasiadas veces con variaciones de la ley de Twyman: cuanto más interesante y\npolémico es un discurso, más probable es que esté equivocado; cuanto más\nimpresionantes sean\nlos datos, más probable es que sean fruto de un error o de una manipulación\ndeliberada. En este caso, lo asocio al reduccionismo tan bestia que apliqué.\u003C/p>"}],month:"10",day:"06"};e[1]={title:"Deja de esperar por otros",slug:"deja-esperar-otros",coverImage:"jon-tyson.jpg",coverPosition:"normal",coverAuthor:"Jon Tyson",excerpt:"Hacerte tus propias herramientas puede acelerar tu trabajo, explico por qué.",date:"2024-09-13T13:00:23.177Z",updated:"2024-09-13T13:00:23.903Z",hidden:false,tags:c,keywords:d,type:"default",fullReload:false,path:"/src/posts/deja-esperar-otros.md",html:"\u003Cp data-svelte-h=\"svelte-c5t86c\">Hasta hace unos años me obsesionaba el tiempo, no me dejaba vivir en paz, siempre\nsentía que no había tiempo para nada y no disfrutaba ni de un mero paseo o de\nleer un libro. Irónicamente, me organizaba mucho peor que ahora.\u003C/p> \u003Cp data-svelte-h=\"svelte-pk5ahq\">En estos años, tras entender que es muy peligroso intentar controlar demasiado\nlos tiempos, cuando entendí que cada día con vida es una victoria y cada\narañazo del bruto de mi gato jugando es vida, el tiempo ya no forma parte de\nninguna ecuación. Si algo no llega a tiempo, pues no llega 🤷‍♂️.\u003C/p> \u003Cp data-svelte-h=\"svelte-197l6dv\">Esto puede sonar especialmente chocante en un consultor. A algunos clientes\ncuando me piden estimaciones de tiempo les digo “esto podría tomar un mes o un\naño, quién sabe”. Me miran raro, se supone que si alguien lo sabe soy yo.\u003C/p> \u003Cp data-svelte-h=\"svelte-ib4xxd\">No suelo infravalorar los factores no medibles y la experiencia me ha enseñado\na no estimar nunca por lo bajo, más vale que sobre el tiempo y darle una alegría\nal cliente al terminar mucho antes de lo previsto, a que falte y que el cliente\nse lleve una desagradable sorpresa, aunque eso suponga perder algunos clientes\ninicialmente a los que tu estimación les parece excesiva.\u003C/p> \u003Cp data-svelte-h=\"svelte-1euodzh\">Cuento esto porque el título de esta entrada podría hacer pensar que para mí\nes especialmente importante la productividad y no perder el tiempo, pero nada\nmás lejos de la realidad. Ahora bien, eso no significa que no haya notado una\nfuerte diferencia entre la productividad inherente a algunas metodologías.\u003C/p> \u003Cp data-svelte-h=\"svelte-zzi0ez\">Como frikazo del tooling y DX, sé muy bien que hacerte tus propias herramientas puede\nacelerar tu trabajo de una forma que no te puedes ni imaginar. Que quede muy claro cuanto antes: no me refiero a \u003Cstrong>reinventar la\nrueda\u003C/strong>. Tampoco lo considero el mal, reinventar tiene numerosas\nventajas y tengo mucho para hablar de ello en otra entrada, pero no, no es\nde esto de lo que trato aquí.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1tmvlw\">Caso real: luces de rotación libre en Three.js\u003C/h2> \u003Ccanvas class=\"three-example\" id=\"free-light-example-canvas\">\u003C/canvas> \u003Cbutton>Ocultar helpers\u003C/button> \u003Cp data-svelte-h=\"svelte-yx5zak\">Si estás en un dispositivo compatible \u003Csmall>(requiere navegador no muy viejo,\ncompatible con WebGL al menos)\u003C/small> estarás viendo una escena donde hay una\nluz direccional. Son fuentes de luz usadas para representar iluminación global\ndireccional plana, habitualmente un sol. Es una luz algo modificada respecto a\nla original. Describo luego.\u003C/p> \u003Cp data-svelte-h=\"svelte-w5qrkk\">Verás, en casi toda solución de renderizado 3D, los objetos\ntienen propiedades de rotación, normalmente asociados a una matriz de\ntransformación. Siempre se puede rotar todo objeto modificando esta propiedad\no bien mediante algún método rotate. En Three.js funciona igual.\u003C/p> \u003Cp data-svelte-h=\"svelte-10quyp6\">La primera experiencia de un alumno mío con Three.js fue nefasta. Me contó que tras una hora\nlo descartó y volvió a otras soluciones como Unity. Concretamente lo que le hizo\nabandonar es que no entendía por qué al rotar una “DirectionalLight” no cambiaba\nnada. El objeto que representa la luz, cambiaba, su matriz efectivamente era\nactualizada, pero no había cambio visible, porque la luz seguía apuntando a\ndonde quería (concretamente hacia la dirección 0,0,0).\u003C/p> \u003Cp data-svelte-h=\"svelte-zy0dfi\">En Three.js (hasta la fecha, release 168), por defecto, la rotación del objeto\nque representa a la fuente de luz es independiente de la dirección de la luz.\nLa luz se controla con la propiedad \u003Ccode>target\u003C/code>. Siempre apunta hacia un objetivo.\nPor defecto, hacia las coordenadas 0,0,0, osea, al centro de la escena.\u003C/p> \u003Cp data-svelte-h=\"svelte-1pb2lwd\">En realidad no supone ningún problema: moviendo el target puedes cambiar la\ndirección, y el target puede ser un objeto vacío invisible por la escena. De\nahí pueden surgir muchas opciones para realmente conseguir el efecto de rotación\nlibre.\u003C/p> \u003Cp data-svelte-h=\"svelte-f7k36c\">Aunque se topó con esto, se convenció de que no tenía sentido y que Three.js era\nsimplemente peor que otras soluciones, que no quería estar apagando fuegos,\nporque si con algo “tan básico” según él, ya había un obstáculo, ¿qué le\ndepararía el futuro? Atento a esto:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">const sun = new DirectionalLight('#ffffff', 2)\nsun.target.position.setZ(1)\nsun.add(sun.target)\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1hstxkr\">En este caso, \u003Ccode>sun\u003C/code> es una \u003Ccode>DirectionalLight\u003C/code> que como todas, siempre apunta a su\ntarget, no cambia, pero ahora el target es hijo de la luz (con add), y además\nestá en frente de ella (1 en Z, entiendo +Z como el frente). Así, al rotar\nsun también rotas el objeto target, haciendo que efectivamente la luz rote\nde manera acorde.\u003C/p> \u003Cp data-svelte-h=\"svelte-1xv2743\">¿Básicamente en 2 líneas hemos hecho que una luz rote acorde a su propiedad\nde rotación?, ¿de pronto tenemos luces como en Unity u otros sistemas? Esto no\nes precisamente un supertrabajo de ingeniería, pero muchos desarrolladores,\njuniors y seniors, tienden a creer que las cosas\nson más complejas de lo que realmente son y demasiadas veces a adoptar un rol\nde mero usuario.\u003C/p> \u003Cp data-svelte-h=\"svelte-12h2073\">Esto es común cuando no están acostumbrados a bibliotecas extensibles, libres y\nbien documentadas. Creen que lo que necesitan debe venir integrado en las\nbibliotecas que utilizan y se olvidan de que pueden extender cuanto quieran, e\nincluso contribuir con sus cambios si son muy útiles para alguien.\u003C/p> \u003Cp data-svelte-h=\"svelte-wynhgl\">Me gusta especialmente Three.js porque la mayoría de clases y funciones son\nbastante obvias. También porque es un entorno con tantos contribuidores\n(más de 800 a fecha de hoy) y tan laxo, que te ves estilos de diseño muy\ndistintos entre cada parte, haciéndolo muy “multicultural” a su manera.\u003C/p> \u003Cp data-svelte-h=\"svelte-1cjupe8\">Siguiendo con el ejemplo, podría abstraerse todo esto y hacer una nueva clase\nque herede de DirectionalLight:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">class RotableDirectionalLight extends DirectionalLight {\n    freeRotationTarget: Object3D\n\n    constructor(color: ColorRepresentation, intensity: number) {\n        super(color, intensity)\n        this.freeRotationTarget = new Object3D()\n        this.freeRotationTarget.setZ(1)\n        this.add(this.freeRotationTarget)\n        this.target = this.freeRotationTarget\n    }\n}\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1k1an1v\">Y así, cuando necesitemos una luz de rotación libre hacer:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">const sun = new RotableDirectionalLight(&#39;#ffffff&#39;, 2)\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-15mcduz\">Solo hay que tener cuidado con la propiedad target, si se modifica manualmente\nya deja de ser de rotación libre y actua como una direccional normal. Esto está\nbien, así puede servir de DirectionalLight cumpliendo el principio de sustitución\nde Liskov en su forma más pura. Guardamos una referencia al nuevo target con esta\nresponsabilidad, para poder restablecerlo en otro momento si se quiere recuperar\nla rotación libre.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-19g7tyv\">Independencia tecnológica\u003C/h2> \u003Cp data-svelte-h=\"svelte-1jgn7bv\">A lo mejor te preguntas por qué iba a querer alguien hacerse sus propias\nherramientas cuando ya existen soluciones similares, peor si piensas en la dichosa\nfrase de “reinventar la rueda”. Y puede que te preguntes cómo se supone que\ntodo esto puede ahorrar tiempo.\u003C/p> \u003Cp data-svelte-h=\"svelte-6lsf2o\">La siguiente respuesta se aplica con mayor notoriedad cuando eres un profesional\ncon mucha experiencia o formas parte de un equipo muy experimentado, que puede\ncrearse la herramienta adecuada en un momento o adaptar otra preexistente. Si\nno es así, probablemente te\nfatigue o incluso no sepas ni por dónde empezar por la mera falta de costumbre.\u003C/p> \u003Cp data-svelte-h=\"svelte-ab3ka0\">Cuando las soluciones existentes son privativas la ventaja es bastante obvia:\ntener libertad y completo control sobre tus herramientas, sin que una empresa de\nturno venga a decirte de pronto qué puedes o no puedes hacer y cuánto debes\npagarle. Además, el soporte a clientes de las herramientas privativas no es tan\nmaravilloso como muchos intentan defender. Te animo a intentar pedirle a Unity\nque solucione alguno de sus millones de problemas técnicos o mejore algunas\nde las herramientas más chapuceras que tiene (como las Unity Style Sheets).\nPor mucho que pagues una licencia, pasarán de ti.\u003C/p> \u003Cp data-svelte-h=\"svelte-1rp33dg\">Pero también es muy común hacerse uno mismo herramientas avanzadas pese a que\nexistan soluciones libres. No siempre uno está\ncontento con la arquitectura o el rumbo del proyecto por buenas que sean\nsus intenciones, y a veces está tan lejos\nde tus requisitos que sentirás que estarás más tiempo pidiendo ayuda y apagando\nfuegos que haciendo algo útil.\u003C/p> \u003Cp data-svelte-h=\"svelte-1g994jb\">Cuando no tienes que esperar por nadie para corregir un problema, sino que\npuedes ser tú mismo (o alguien de tu equipo) quien lo haga, con garantías de que\neventualmente se hará y exactamente como uno espera que se haga, no hay pausas\nsalvo las que tú decidas. Te aseguro que en este mundo se notan más las pausas\nque simplemente “ir lento”, no solo en el tiempo, también en la motivación.\u003C/p> \u003Cp data-svelte-h=\"svelte-gjgp1o\">Además, la complejidad de las características de bibliotecas, frameworks o\nsistemas de naturaleza\ngeneralista o multipropósito puede llegar a ser tan grande, que simplemente\nestudiarte la documentación y un uso básico se vuelve una pesadilla, siendo\nmás viable y habitualmente más eficiente hacerte una herramienta a medida o\nutilizar bibliotecas orientadas a una única responsabilidad.\u003C/p> \u003Cp data-svelte-h=\"svelte-6ydtym\">Three.js y PixiJS, por ejemplo, no son motores de videojuego, no tienen\nfísicas ni muchas otras herramientas, porque su rol principal es de renderizado.\nAdaptarlas a un sistema\nmás complejo implica también estudiarlas hasta el punto que más o menos puedes\nentender bien su arquitectura interna, así que te es muy fácil modificarlas\nsi lo necesitas.\u003C/p> \u003Cp data-svelte-h=\"svelte-vjyqrs\">En cualquier caso, el objetivo se puede resumir en buscar independencia. Entre más\ndependes de soluciones de terceros y entre más completas son sus soluciones,\nmenos margen de maniobra tienes cuando hay un problema serio con esa dependencia.\nHe visto a gente mantener issues en bibliotecas durante más de 5 años preguntando\ncada 3 meses “¿existe ya una solución?” y quejándose, cuando lo que piden se\npuede resolver en una tarde o dos.\u003C/p> \u003Cp data-svelte-h=\"svelte-11prgsj\">Por último y no menos importante hay otra razón para querer\nhacerte tus propias herramientas: por diversión o arte.\nEstoy algo cansado de los utilitaristas. Insisto mucho en que esto es un arte,\ny para muchos es nuestro hobby principal además de nuestra profesión. A veces\nsimplemente queremos intentar hacer algo por nuestra cuenta e intentar hacerlo\nmejor, sin desmerecer cualquier otra solución previa y sin ánimo de aportar nada\no competir. A veces es una oportunidad magnífica para mejorar.\u003C/p>",relatedPosts:[{title:"Especificación visual. Caso Point it out!",slug:"especificacion-visual-caso-point-it-out",coverImage:"pio-round-fail-test.png",coverAuthor:"",excerpt:"Caso de un proyecto en activo para el que repaso el concepto de regresión visual y especificación visual. Contenido denso.",date:"2024-07-25T15:06:23.177Z",updated:"2024-07-25T15:06:23.903Z",hidden:false,tags:f,keywords:g,type:"default",coverPosition:"top",path:"/src/posts/especificacion-visual-caso-point-it-out.md",html:"\u003Cp data-svelte-h=\"svelte-kz757p\">He tenido la necesidad de crear formas posicionables sobre sitios web,\nseñalando o conectando elementos. Muchas veces. Es un must en aplicaciones\ninteractivas que requieren de algún tipo de señalización, como podría ocurrir\nen tutoriales.\u003C/p> \u003Cp data-svelte-h=\"svelte-yr62zz\">Harto de reinventar la rueda decido buscar una biblioteca sencillita que me\nresuelva este problema. Esperaba encontrar muchas para ello, o quizás\ncomo alguna feature de alguna muy gorda y conocida.\nEstaba casi convencido de que existiría algo, pero que aún así quizás tendría que\nhacer yo mismo una biblioteca propia con \u003Cstrong>filosofía minimalista\u003C/strong>.\u003C/p> \u003Cp data-svelte-h=\"svelte-1ajb8gz\">Pero lo cierto es que, al menos en unas pocas búsquedas sencillas, no he\nencontrado nada. Que no sea fácil de encontrar no significa que no exista,\nno te imaginas cuántas superherramientas sin visibilidad he encontrado entre\nrepositorios perdidos.\u003C/p> \u003Cp data-svelte-h=\"svelte-10jjd54\">A falta de soluciones (o como resultado de una mala investigación), me pongo\nmanos a la obra en el desarrollo de una biblioteca para ello (Point it out) y\nme doy cuenta de que necesito algo para especificar qué resultado visual busco.\nNecesito alguna técnica de \u003Cstrong>especificación visual\u003C/strong>, si es que existe algo\nasí y si significa lo que pretendo que signifique.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-jzlcfs\">Describiendo el problema: cómo señalizar elementos\u003C/h2> \u003Cp>Por ejemplo, ¿qué podría hacer si quisiera\nseñalizar \u003Cspan class=\"no-wrap svelte-49cqox\">\u003Cspan id=\"example-target\" class=\"hl\" data-svelte-h=\"svelte-tntrd9\">estas palabras\u003C/span>\u003C/span>?\nSi todo funciona bien deberías estar viendo un rectángulo verde sobre las palabras indicadas.\u003C/p> \u003Cp data-svelte-h=\"svelte-h9dgi1\">“Pero Alexander, ¿me estás diciendo que ya existe entonces solución?” No, lo que\nestás viendo es fruto del resultado final (o al menos de lo que ya tengo\ndesarrollado). Dado que ya tengo una medio solución, ¿por qué no mostrarlo?\u003C/p> \u003Cdiv class=\"info-box svelte-16gsg44\"> \u003Cp data-svelte-h=\"svelte-enicy2\">AVISO: ¿Estás buscando un tutorial paso a paso de cómo\ndesarrollar una biblioteca de manera profesional? Pues este NO es el lugar.\nSolo encontrarás fragmentos de código relevantes para plantear el temita\nde la especificación visual.\u003C/p> \u003C/div> \u003Cp data-svelte-h=\"svelte-wn3vay\">En una primera versión, la biblioteca debía aportar al menos un primer mecanismo simple de\nseñalización. Para ello especifiqué la siguiente función:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">create(shape: ShapeName, {target: string | HTMLElement})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-rz0i50\">\u003Ccode>ShapeName\u003C/code> se trata de una string, un tipo de unión ‘rect’ | ‘image’, aunque\nen un primer momento solo existe ‘rect’. La opción target es un selector CSS\no una referencia directa al elemento objetivo.\u003C/p> \u003Cul data-svelte-h=\"svelte-ts57wb\">\u003Cli>Si es un selector, trabajará con el primer elemento que encuentre con ese selector, o lanzará excepción si no encuentra nada.\u003C/li> \u003Cli>Creará un elemento SVG que añadirá como hijo al body.\u003C/li> \u003Cli>Dicho SVG debe estar posicionado absolutamente sobre el elemento a señalar.\u003C/li> \u003Cli>Dicho SVG debe tener un tamaño similar al elemento a señalar.\n\u003Cul>\u003Cli>Digo similar porque podría ser más grande, si quiere rodearse sin taparlo.\u003C/li>\u003C/ul>\u003C/li>\u003C/ul> \u003Cp data-svelte-h=\"svelte-1li2hkb\">En las primeras iteraciones de herramientas gráficas me gusta centrarme en la exploración tecnológica. Hacer un caso mínimo funcional que dé un resultado visual inmediato.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-1cetu9r\">Especificaciones formales con algún framework de testing\u003C/h3> \u003Cp data-svelte-h=\"svelte-nv0msx\">Aquí empieza lo realmente interesante. Hay que testar visualmente, eso está\nclaro, estamos ante una librería cuyo objetivo es renderizar cosas. Pero eso no\nsignifica que inmediatamente todo vaya a ser regresión visual y E2E.\nConsidera la siguiente spec:\u003C/p>  \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">describe('create(...)', ()=>{\n    ...\n    it('creates an SVG and appends it to the body', ()=>{\n        ...\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-86gsr\">Esto no requiere renderizado. Vale con un DOM virtual, comprobar que se crea\nun nuevo nodo y si queda colgando del body. Hacer una prueba E2E para esto es\nmatar moscas a cañonazos.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1jmchc1\">Especificación visual\u003C/h2> \u003Cp data-svelte-h=\"svelte-18ctydr\">Me gusta la \u003Cem>regresión visual\u003C/em>, pero tiene un pequeño problema. Por si no sabes\nde qué te estoy hablando, consiste en la generación y comparación mediante\nsnapshots \u003Cem>(ficheros que describan el estado de una aplicación ante\nciertas condiciones. Típicamente suelen ser screenshots)\u003C/em>. Su fortaleza\nreside en la cobertura futura. Por lo general se\ngeneran snapshots una vez se tiene el resultado buscado para que en futuras\ncomparaciones tras refactoring recibamos un feedback de si algo ha cambiado más\nde lo esperado.\u003C/p> \u003Cp data-svelte-h=\"svelte-13avi2k\">Y aunque es una herramienta útil y bienvenida en mantenimiento de aplicaciones\nque controlan muy bien la interfaz de usuario y donde es crítico que estas no\ncambien inesperadamente, la regresión visual no forma exactamente parte del\nflujo de las metodologías estilo TDD, BDD o ATDD. Recordemos que son\nmetodologías de diseño y \u003Cstrong>la regresión visual no aporta nada en la fase de diseño o para definir especificaciones preimplementación.\u003C/strong>\u003C/p> \u003Ch3 data-svelte-h=\"svelte-1gxnwn7\">Buscando la alternativa a la regresión visual\u003C/h3> \u003Cp>La siguiente forma de proceder y opiniones son, hasta donde sé, de \u003Cspan class=\"no-wrap svelte-49cqox\">Cosexa Pgropia™\u003C/span>. No he hecho una investigación exhaustiva ni\nsé si hay autores que han escrito sobre esto a favor o en contra. Por eso no\nasumas nada de lo que expongo aquí, evita todo prejuicio positivo y afila la\nsospecha y la duda.\u003C/p> \u003Cp data-svelte-h=\"svelte-evd6ah\">El proceso que he realizado es el siguiente: adaptar una biblioteca o framework\ncon capacidades para regresión visual (en este caso Playwright) para que\nen su lugar genere screenshots de dos páginas distintas y\nlas compare. Una de las páginas presenta el escenario donde ejecutas la acción\na probar; la otra es la versión con el resultado final esperado, hecha a mano\ny centrándonos solo en el resultado visual.\u003C/p> \u003Cp data-svelte-h=\"svelte-1usqu0d\">Supongamos la siguiente especificacion:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">describe(\"create('rect', {...})\", ()=> {\n    ...\n    describe('Default behaviors (no options)', () => {\n        ...\n        it('creates an orange rect of 4px width around target', ()=>{\n            ...\n        })\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-13cl2ob\">Nuestro escenario de pruebas podría contener, entre otras cosas, lo siguiente:\u003C/p> \u003Cdiv class=\"columns-container svelte-j14ov3\" style=\"--gap: 4px\">\u003Cdiv class=\"columns-container__left svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #e34c26\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">HTML\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-html svelte-fcvtd2\">&lt;div class=\"test-box\">&lt;/div>\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003Cdiv class=\"columns-container__right svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #2965f1\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">CSS\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-css svelte-fcvtd2\">.test-box {\n    background: #333;\n    width: 250px;\n    height: 150px;\n}\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003C/div> \u003Cdiv class=\"example svelte-1e8u39k\">\u003Cdiv class=\"test-box svelte-1e8u39k\" style=\"width: 250px; height: 150px\">\u003C/div> \u003C/div> \u003Cp data-svelte-h=\"svelte-1pvoef4\">Y por otra parte, una página copia modificada con el resultado VISUAL esperado\u003C/p> \u003Cdiv class=\"columns-container svelte-j14ov3\" style=\"--gap: 4px\">\u003Cdiv class=\"columns-container__left svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #e34c26\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">HTML\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-html svelte-fcvtd2\">&lt;div class=\"test-box test-box--expected\">&lt;/div>\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003Cdiv class=\"columns-container__right svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #2965f1\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">CSS\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-css svelte-fcvtd2\">...\n.test-box--expected {\n    box-sizing: content-box;\n    border: 4px solid orange;\n}\n\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003C/div> \u003Cdiv class=\"example svelte-1e8u39k\">\u003Cdiv class=\"test-box svelte-1e8u39k test-box--expected\" style=\"width: 250px; height: 150px\">\u003C/div> \u003C/div> \u003Cp data-svelte-h=\"svelte-s99gcn\">SÉ LO QUE ESTÁS PENSANDO (o deberías): “pero Alexander, en el esperado no hay\nningún SVG, ¡solo le has puesto un borde naranja de 4 píxeles al elemento!”\u003C/p> \u003Cp data-svelte-h=\"svelte-xp8med\">A esto es a lo que me refiero con especificación visual. Podría haber un SVG\nhecho a mano (de hecho los hay en specs más complejas) y seguiría siendo válido,\npero en realidad no importa la estructura,\nno es lo que estamos especificando ni testando aquí.\u003C/p> \u003Cp data-svelte-h=\"svelte-1qkk97s\">Al igual que con tests convencionales, buscamos la forma menos compleja y más\ndirecta de definir lo que queremos (en este caso lo que queremos visualmente).\u003C/p> \u003Cp data-svelte-h=\"svelte-lro4l7\">Créeme, esto no lo hago por mejorar la adaptabilidad y reducir la fragilidad del\ntest, aunque sean sus efectos positivos principales, sino porque simplemente es la\nforma más sencilla que se me ha ocurrido de conseguir lo que se busca visualmente.\u003C/p> \u003Cp data-svelte-h=\"svelte-1hghbyz\">En una clásica “especificación por ejemplo” con GIVEN-WHEN-THEN, esta parte\ncorrespondería al THEN, y al igual que en las especificaciones convencionales,\ndebe expresarse de la forma más directa y clara atendiendo en este caso\nexclusivamente al resultado visible (ya que es la única responsabilidad en\nestos tests).\u003C/p> \u003Cp data-svelte-h=\"svelte-1n9drh4\">Veamos un test similar al del Mundo Real™. El original y funcional lo tienes\nen el repositorio (enlace al final). Es un test parametrizado, se genera con variaciones de\nexpectedWidth (xW) y expectedHeight (xH).\u003C/p> \u003Cdiv class=\"code-wrapper svelte-fcvtd2\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-fcvtd2\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-fcvtd2\"> \u003C/div> \u003Cpre class=\"svelte-fcvtd2\">\u003Ccode class=\"language-typescript svelte-fcvtd2\">it(`creates an orange rect of 4px width around target (${xW}x${xH})`, async ({ page }) => {\n    await comparePages({\n        testingURL: `/${xW}x${xH}`,\n        expectedURL: `/expected/rect/${xW}x${xH}-default`,\n        action: () => {\n            return page.evaluate(() => {\n                pio.create('rect', {target: `.test-box--${xW}x${xH}`})\n            })\n        }\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Csmall data-svelte-h=\"svelte-og0ogg\">NOTA: que veas tanta especificidad como\norange o 4px, algo que no suele ser recomendado en specs/tests, es normal en este caso porque\nestamos especificando los valores default, es de las pocas excepciones a la regla.\u003C/small> \u003Cp data-svelte-h=\"svelte-1u74y51\">La función es autoexplicativa. Recibe la página donde se ejecutará la acción\na testar, la página con la que comparar, y la acción a realizar. Tras lanzar el\ntest debería fallar al no tener implementación inicialmente.\nEl test report de Playwright en este caso me reporta una comparación de\nmúltiples formas, entre ellas una muy chula con un slider. Captura:\u003C/p> \u003Cdiv class=\"image-wrapper\">\u003Ca href=\"/_app/immutable/assets/captura-error.DS5ipSG-.png\" target=\"_blank\">\u003Cimg src=\"/_app/immutable/assets/captura-error.DS5ipSG-.png\" alt=\"Test report de Playwright mostrando resultado actual y esperado con slider\" class=\"svelte-u0jlpn\">\u003C/a>\u003C/div> \u003Cdiv class=\"info-box svelte-16gsg44\"> Lamentablemente Playwright no tiene una función tan mágica y bonita como\ncomparePages. Es propia, resultado de un poco de \nhacking con los mecanismos de regresión visual de Playwright, pero tienes total\nlibertad para meterle un copia y pega (hazlo del repo, que es la que funciona). \u003C/div> \u003Ch4 data-svelte-h=\"svelte-ftmlr4\">Sólo lo visible\u003C/h4> \u003Cp data-svelte-h=\"svelte-1dxwr9q\">Tengo que insistir en que sólo hago esto con fines de testar el resultado\nvisual. Puede que te preguntes algo como “¿No estás perdiendo la oportunidad\nde especificar directamente un resultado final que sirva también de\nespecificación del DOM deseado para una prueba E2E completa?”\u003C/p> \u003Cp data-svelte-h=\"svelte-1t2sbdi\">No conozco (todavía) el DOM deseado y no puedo \u003Cem>perder tiempo\u003C/em> planificando.\nEsto me permite especificar el\nresultado visual, que es lo único que tengo claro ahora mismo. Además los SVG\npara un mismo objetivo se pueden generar de múltiples maneras. Exagerar el\ndetalle aumenta la rigidez del diseño, no permite posponer decisiones y aumenta\nla fragilidad de los tests.\u003C/p> \u003Cp data-svelte-h=\"svelte-1d5db4w\">Por otra parte también nos limitaría más con escenarios menos deterministas.\nImagina que quieres que el recuadro\nsiga al elemento si este se reposiciona (típico al reescalar pantalla).\nEsto es algo que debe hacer la biblioteca, ¿cómo especificaríamos algo así?\nImplicaría lógica en el propio test. En los expects\nse evitan lógicas complejas a favor de resultados directos deterministas.\nUn borde por CSS no solo está fijado a un elemento, también funciona aunque\nreescales o lo muevas.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-xnqpfg\">Otras preguntas relacionadas que me he planteado\u003C/h3> \u003Cp data-svelte-h=\"svelte-10rlsf7\">¿Por qué hacer un esfuerzo en especificar partes del aspecto visual esperado\nen un desarrollo si muy probablemente haya partes que no\npodremos especificar de todas formas?, ¿no es como intentar construir una casa\nen la que sabemos de antemano que nunca tendremos techo o alguna otra parte\nfundamental?\u003C/p> \u003Cp data-svelte-h=\"svelte-1t9pwnw\">Ya tenemos la respuesta en la jerarquía de tests. Sabemos que las pruebas\nunitarias no nos sirven para todo, ni tampoco las de integración. Pero lo\nhacemos igualmente porque nos guían y cubren el desarrollo, cada una a su\nmanera, con pros y contras. Técnicamente podríamos usar solo tests de aceptación\nsi estos fueran infinitamente rápidos, y aún así, muy probablemente se seguirían\nrealizando pruebas unitarias y de integración junto a ellos.\u003C/p> \u003Cp data-svelte-h=\"svelte-dp70ds\">Puedes tener un muy buen maquetador, diseñador, artista o artista técnico en tu\nequipo durante el desarrollo de una aplicación, con capacidad para\ndiseñar/especificar rápidamente el resultado que quieres pero sin competencias o tiempo\npara realizar la herramienta que produzca ese resultado.\u003C/p> \u003Cp data-svelte-h=\"svelte-hpg0ix\">He conocido empresas que trabajan con un flujo basado en\nprototipos, y eso está perfecto, pero podría ser muy útil entender esos\nprototipos como especificaciones y realizar pruebas directas contra ellos.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-12fyqdo\">¿Cómo de útil es esto realmente?\u003C/h3> \u003Cp data-svelte-h=\"svelte-1lhdzti\">La respuesta es algo evidente: si fuera muy útil habría\nliteratura al respecto y alguna que otra herramienta conocida. Créeme, no soy\nningún genio extendiendo el estado del arte. Esta “técnica”\nviene de perlas para el desarrollo de esta biblioteca en concreto, pero, ¿se\nte ocurre alguna otra? No es especialmente extrapolable. Ni siquiera es\nsuficiente para todos los casos de esta biblioteca.\u003C/p> \u003Cp data-svelte-h=\"svelte-1rh7odk\">Voy a describirte un caso difícil de explicar: imagina que quieres\nseñalizar con una flecha que apunta siempre a un objetivo.\nSupón que incluso aunque este se mueva en pantalla la flecha mantenga su\nposición y gire apuntando siempre al objetivo (un “look at” en gráficos).\u003C/p> \u003Cp data-svelte-h=\"svelte-urr5oj\">La descripción anterior es incluso difícil de imaginar para algunos, supone\nproblemas en cómo especificarla y cómo testarla. Y ni siquiera es algo realmente\ncomplejo. En las artes visuales muchas\nveces no queda más remedio que romper el orden rojo-verde porque el esfuerzo de\nespecificar puede ser indistinguible del de implementar.\u003C/p> \u003Cp data-svelte-h=\"svelte-1appavq\">Es ahí donde destaca la regresión visual clásica. Implementas y cuando e
