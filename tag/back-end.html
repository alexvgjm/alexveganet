header> <p class="post__excerpt svelte-11dvqi">Entrada resubida. Cuento una batalla contra el servicio Firebase de Google y un caso de aplicación de ingeniería de software.</p> <footer class="post__footer svelte-11dvqi"><div class="post__tags svelte-11dvqi"><a class="tag svelte-rpb2ex" href="/tag/hacking">Hacking</a><a class="tag svelte-rpb2ex" href="/tag/back-end">Back end</a><a class="tag svelte-rpb2ex" href="/tag/front-end">Front end</a><a class="tag svelte-rpb2ex" href="/tag/cloud">Cloud</a></div></footer></article> </a></div> </section></main> <footer class="svelte-1pvwjww" data-svelte-h="svelte-1sivwpm">Alexander Vega © 2024

			<script>
				{
					__sveltekit_ebvywi = {

					const element = document.currentScript.parentElement;

					const data = [null,{"type":"data","data":(function(a){a[0]={title:"El hacking a Google",slug:"el-hacking-a-google",coverImage:"machinery.jpg",coverAuthor:"Isis França",excerpt:"Entrada resubida. Cuento una batalla contra el servicio Firebase de Google y un caso de aplicación de ingeniería de software.",date:"2024-08-02T01:19:04.325Z",updated:"2024-08-02T01:19:04.326Z",hidden:false,tags:["Hacking","Back end","Front end","Cloud"],keywords:[],type:"default",path:"/src/posts/el-hacking-a-google.md",html:"\u003Cdiv class=\"info-box svelte-16gsg44\"> Entrada resubida, rescatada de tantas tonterías que escribí hace un \npar de años. Contra todo pronóstico resulta ser que interesó a algunas personas, \nlas mismas que me pidieron la resubida para mantener ciertas fuentes. Aunque \nhe borrado la parte personal dado que estoy preparando otra entrada\nrelacionada a salud mental. \u003C/div> \u003Cp data-svelte-h=\"svelte-1mjfyua\">Mi último año por la universidad cursé una asignatura de desarrollo de\naplicaciones web de la mano de un profesor al que estaré eternamente agradecido:\nAbraham Rodríguez, el ahora vicegerente de Agenda Digital de la ULPGC, lo que\ncarajo sea que eso signifique…\u003C/p> \u003Cp data-svelte-h=\"svelte-1c8qw35\">Una de las primeras tareas consistía en hacer una aplicación con Angular 2+ e\nIonic que de backend utilizara el servicio Firebase de Google.\u003C/p> \u003Cp data-svelte-h=\"svelte-13zoj2o\">Por aquel entonces nos hacían trabajar con la base\nde datos en tiempo real de dicho servicio, algo que podía explotarse muy bien\ncon la librería RxJS —la implementación de ReactiveX en JavaScript— para obtener\nreactividad de datos a nivel de servicio y a través de sockets. Se hacía uso del\nframework NgRx sobre ella, que facilitaba las tareas de comunicación y\ncontrol de estado centralizado, distribuido en red y reactivo en Angular.\u003C/p> \u003Cp data-svelte-h=\"svelte-glayny\">Mi descubrimiento de ReactiveX y los diagramas reactivos me emocionó, muchísimo,\nera un nuevo mundo que bebía del mecanismo, patrón, técnica, paradigma y casi\nfilosofía de desarrollo que más me gustaba: era la evolución del patrón\nobserver y la programación reactiva en general, llevada a red. Aún ni conocía\nqué era la Event-Driven Architecture, pero sí me sentía atraído por\nuna comunicación vía observación, eventos y mensajes. Sabía que sería\nun trabajo que disfrutar como un niño pequeño. El problema es que Google\ndecidió poner obstáculos.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-scitqc\">Las antiguas limitaciones de Cloud Functions\u003C/h2> \u003Cp data-svelte-h=\"svelte-7tylqy\">Concretamente solo me tocó hacer un mero chat por salas, pero Google me\nbloqueaba un servicio de Firebase fundamental: Cloud Functions. Lo cierto es que\nsu único requisito era que pusiera una tarjeta de crédito o débito y ni siquiera\nconllevaba ningún cargo inicial salvo que gastaras mucho tiempo de ejecución\no hicieras miles de llamadas a las funciones.\u003C/p> \u003Cp data-svelte-h=\"svelte-rwfbr7\">Cloud Functions es una característica y framework de Firebase que\npermite ejecutar código JS en la nube a través de peticiones http y que se\nintegraba correctamente con la base de datos en tiempo real (RTDB, del inglés)\ny otras features cloud del servicio. Todas estas historias que se\npopularizaron como serverless computing y permitían hacer una API rápidamente.\u003C/p> \u003Cp data-svelte-h=\"svelte-15pt39w\">Muy convenientemente para Google estas funciones podían entrar en una\nsuerte de recursividad casi infinita si tenías un error, generando facturas\nde cientos de euros en una noche si no te dabas cuenta. Por ello nunca deberías\nusar tu tarjeta en un servicio que no te establezca un límite duro de cuotas y\nte de opción de detener el servicio si se superan en lugar de cobrarte por\nexceso. Y no, no vale una tarjeta monedero, acabarás con una deuda que Google\nintentará resolver de forma muy activa por lo que me han contado.\u003C/p> \u003Cp data-svelte-h=\"svelte-v4oe8z\">Ignorando a Cloud Functions, los primeros cuatro días los invertí buscando\nformas de conseguir un CRUD perfecto con validación en backend usando\nexclusivamente la base de datos y su sistema de permisos integrados con su\nsistema de auth. No tardaron en aparecer los primeros inconvenientes.\u003C/p> \u003Cp data-svelte-h=\"svelte-1bnaaes\">Necesitaba algunas funciones relacionadas a la creación de salas y el límite\nde salas que podía tener un único usuario, algo que requería algo más de\nlógica. Desde una API con Cloud Functions no costaba nada, mientras que por\nrazones de responsabilidad no eran posibles de realizar en la base de datos. Los\nesquemas de la RTDB eran más reducidos que ahora.\u003C/p> \u003Cfigure class=\"image-wrapper\">\u003Ca href=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAWoAAADyCAMAAABTRH9LAAAAM1BMVEUAAAD///8AAADOzs6mpqaDg4MWFhZjY2MuLi5HR0cHBwfy8vINDQ3Pz894eHiAgICPj4990EOxAAAAAXRSTlMAQObYZgAACEtJREFUeNrsm4FuozAMhhfbJOH9X/iM6xR21OikcYCn/5PaJsRRra+RxyT8ReAavr6ogCuA6giozgtUR0B1XqA6AqrzAtURUJ0XqI6A6rxAdQRU5wWqI6A6L1AdAdV5geoIqM5LoJrAz/h31TjpPwOqQ6A6LVAdAtVpgeoQqE4LVIdAdVqgOgSqC9PCxCTfLnJ5OClVD6tQHXCyaiYR6qR5EbHOZqKplElncymNbKZrz/kJkqtWnbWpX531IrpAojNmWtZfa09JO6dqpb9Uc5Elrfqq3L2xrbP/Gr5WnkFK1ebxrXqh2cXerHL41WmslWeQX3UtPlsOsBCv66xrDyK9avVbhIRpLjoVTbITT3VZH2vlGeRXXaxWqGqycq0TFawTktfaU0p1RtVZgeoQqE4LVIdAdVqgOgSq0wLVIVCdFqi+DMKTqEfgSdRSfkl+UG1ANVTfT8b8oNqAaqi+n4z5QbUB1VB9Pxnzg2oDqqH6fjLmB9UGVEO1w0RU/WnFHSQeETzeJeQbT1dNBu+SFf/KeNO8zc5h4vtVy5J2q8eqOd79v061/bRz/6j6eFOdH6q6NnsXU01EsqTlL5q3qv0661VqxYL1VdeNvuK9FmeoFvKWjdHHwST+ldR0Pr0z4e0m9mgN9dFBN8hlqplkHVh3BLtSm31Wrdft8dw2C60bx4r3Wpx0qr1lw/s41gJCcxHPxCPGJg31aFn3xd0gF6rmt2ob1+mtlLe1ug/V/mEHTt+DjSfV6nfLBlseW9Vi2TGxR7jqEe0rPjrqBrlItcvcVMHeti7rp1Pty57tbmORkwoI6+vdstFICVRbxPZUe7SG+uioG+Qy1b3Z+3Rwqo9V7zZ67AkFZFrbOYQ4PNV1V+A9eh0F3SC33YF4yV0SbvpR5++12q8PoSS6TWhf5Kd6Wq3ufbRsCOnss2qPeG/SZDxaaIyOukEuU11kc1+tQ7E/06p0mfW+qh7XNzcotMTsb11mm52hmql5y4b3cZhk+ku1RyheEUa0zn100A2C/ Af9pFFJpILz+MxPqpuUDVVT1DE8Zu+ikLt/bvPhaWq0VBJ7TWNCEX6/Bdx7qo6lzr+ZzjFQ3XKIhkyYZ3q8zAPhY5xqhZqTtLj9FTVSTFU16zQj8Ra8QQUpCgRitCmxBbWqA4YqsdYBaHN34xzI9VapMauGuGIv7Sk5DzSJkrNUqsi2Nk2tvBMVQuCVXWRm3FupDpnibVvgNmyigCinEfa6PGBFBTBaqwvrNmr5ZPqFMdefTfOfVQXSwjhnzPGwuVIGxVNmmSkIH1hQVXr6+99VYf7cW6juqWR4kV1LGJlkuSFJYVcLymkZV+LEfp5rz6/wW/EudfXYj4CrvWieuR4HmmjIgVB1Aoqp76wQrWUz08g2VSH+3FuozrltuldVcvluTVatWSIaEsDGAtLVCvyqfogjzdRbsa5T1V/D38tUrUIVVP183iMj6obVE3Vz+MxPqpuUDVVP4/H+NiJeoWdqP6g6ilU7RaqnkLVbqHqKVTtFqqeQtVu+c2qFVE2wp3qqz9FeN8ZarN1K9P+VOdS73bg7nP9l0/VSSF2FWM8qxqA9dhVscGYDaKoQJYd8KbaWlsV7eqspnp0hiJIhNqgzeZj3C5t3CJyd6pba6tVbcmKj87Q3n7XBwi9XVD3uUnQm+qCF03eVfVBxgu1wZgtmap/ylmrob1cVAdzagNW9X8zWlsVdezVozP0cFygNjj36p1ufXWmure2tueKIF21As0zYoo2OJ9AHr+00a/qTa44p+q98anaJVQ9hardQtVTqNotVD2Fqt1C1d/ATlSP8LKSH+HqUGVC1V9A1X6h6hlU7ReqnkHVfqHqGVTtF6qeQdV+oeoZVO0Xqp5B1X6h6hlU7ReqXoSpJmv4Q5bxFwShgra0PpAdAAAAAElFTkSuQmCC\" alt=\"Modelo describiendo la comunicación tradicional con Firebase\" class=\"svelte-u0jlpn\">\u003C/a> \u003Cfigcaption class=\"svelte-u0jlpn\">\u003C!-- HTML_TAG_START -->Modelo ideal. No válido dado que Google bloqueaba cualquier tipo de petición externa a Cloud Functions si no tenías tarjeta de crédito o débito.\u003C!-- HTML_TAG_END -->\u003C/figcaption>\u003C/figure> \u003Cp data-svelte-h=\"svelte-1mfqzxf\">Pero Cloud Functions en realidad sí estaba disponible, lo único que limitaba\neran las llamadas a la API de manera externa, vamos, justamente lo que más\nnecesita alguien que quiera usar el servicio.\u003C/p> \u003Cp data-svelte-h=\"svelte-tm1gye\">Lo que exploté es que sí permitía definir “triggers” o disparadores.\nFunciones que se ejecutaran ante situaciones concretas en la base de datos,\ncomo que un usuario escribe un dato en determinado nodo.\u003C/p> \u003Cp data-svelte-h=\"svelte-areo0q\">El servicio no garantizaba que la ejecución de esos disparadores fuera\ninmediata. Además, solo se podía comunicar con la base de datos,\nno podía responder hacia fuera de ninguna manera… ¿o sí? 🙂\u003C/p> \u003Ch2 data-svelte-h=\"svelte-bxldt2\">Los observables\u003C/h2> \u003Cp data-svelte-h=\"svelte-1tm3ijv\">La gracia de la RTDB es que es en tiempo real como su nombre indica. Esto\nsignifica que puedes observar cualquier nodo mediante un\nsocket y que te sea notificado cuando cambie. Esto es lo que permite, por\nejemplo, que veas mensajes aparecer en un chat sin tu pulsar un botón de\nrefrescar.\u003C/p> \u003Cp data-svelte-h=\"svelte-uq0d93\">Ahora supongamos una base de datos en la que se reserva para cada usuario un\nnodo con 2 subnodos a los que coherentemente llamamos request y response:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: transparent\"> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">...,\nuserRequests: {\n    v8934sdafbi4r3vfewsjkvwevqwe: {\n        request: { ... },\n        response: { ... }\n    },\n    wigr908u43nwpdfglxjretjkhne3: {\n        request: { ... },\n        response: { ... }\n    }\n}\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-unhgdf\">Cuando un usuario quiere hacer una petición POST, en lugar de hacer una petición\nHTTP a Cloud Functions con el clásico fetch de JavaScript, puede\nescribir directamente en su nodo request adecuado en la RTDB con NgRx.\nLas ristras largas y aleatorias representan la ID de un usuario autenticado,\nque bien podría ser un UUID estándar.\nEn su propio nodo request —que es donde único tendría permiso de escritura un\nusuario— puede establecer los datos de la petición.\u003C/p> \u003Cp data-svelte-h=\"svelte-1iicecn\">El exploit reside en la configuración de un trigger que se disparará cuando un\nusuario escriba su request. Este nodo solo tiene\nparámetros como si de una función post se tratara. El trigger ya me adelanta\nparte del trabajo porque por defecto recibe información acerca del\nusuario que ha causado el cambio y el nodo cambiado. Por tanto,\nescribir en el nodo request provoca la llamada a una función que conocerá dicho\ncontexto siendo, en efecto, una forma de invocar una función con argumentos.\u003C/p> \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: transparent\"> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">...,\nuserRequests: {\n    v8934sdafbi4r3vfewsjkvwevqwe: {\n        request: {\n            id: '4afb4ef5065a',\n            op: 'CREATE_ROOM',\n            body: { password: '1234' }\n        },\n        response: {\n            id: '4afb4ef5065a',\n            body: { createdRoomID: 'x87bhu43'}\n        }\n    },\n    ...\n}\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1nsooy1\">Si se quiere crear una sala de chat, el usuario solo tendría que escribir en su\nnodo request un UUID aleatorio generado previamente a fin de tener algo que\nidentifique la petición, la operación que quiere realizar\n(CREATE_ROOM en este caso) y los parámetros que pueda requerir dicha operación.\nEn este ejemplo el único parámetro se trataba de una contraseña para la sala.\u003C/p> \u003Cp data-svelte-h=\"svelte-1u2tz29\">En resumen: hice una API a través de una base de datos. La forma de recibir\nrespuesta es mediante eventos, usando NgRx se observa el\nnodo response. Sabrá que ha sido respondida cuando la ID en response coincida\ncon la ID enviada. Y la respuesta la recibirá en el nodo body de response. En\neste caso el servidor da una ID de la sala, la típica que compartir con tus\namigos para que entren como se hace en juegos online o Hangouts (EDIT:\nactualmente Meets)\u003C/p> \u003Cfigure class=\"image-wrapper\">\u003Ca href=\"/_app/immutable/assets/caso-hacking-firebase-modelo2.Cy1_403W.png\" target=\"_blank\">\u003Cimg src=\"/_app/immutable/assets/caso-hacking-firebase-modelo2.Cy1_403W.png\" alt=\"diagrama describiendo la comunicación con el servicio faked\" class=\"svelte-u0jlpn\">\u003C/a> \u003Cfigcaption class=\"svelte-u0jlpn\">\u003C!-- HTML_TAG_START -->Modificaciones. Las peticiones por fetch son reemplazadas por escrituras en la RTDB que disparaban triggers de Cloud Functions. La instancia concreta de FakeAPIService en realidad se inyecta. \u003Csmall>Nota en 2024: Ahora soy consciente de que, aunque correcto, el diagrama es bastante feucho. En esos tiempos no conocía formas más claras de representar inyecciones de dependencias, inversiones de control y otras tantas cosas.\u003C/small>\u003C!-- HTML_TAG_END -->\u003C/figcaption>\u003C/figure> \u003Cp data-svelte-h=\"svelte-1b6hvwu\">Todo este proceso es transparente a la aplicación. Podemos abstraer una interfaz\ndel servicio original y mantener las dos implementaciones si queremos, como\nse muestra en el diagrama. Para\nla aplicación, la interfaz del servicio sería la misma, que puede trabajar con\nsimples promesas como si de un fetch se tratara.\u003C/p> \u003Cp data-svelte-h=\"svelte-5vr4hi\">Claro que esto no es un uso realista de la base de datos. Estamos\nsobrecargándola y además implica tratar con unas esperas del trigger que a veces\npodía llegar a los 4 segundos. Para una operación de creación de un recurso\nno es algo tan bestial, pero estas esperas reducen drásticamente la\naplicabilidad en muchos otros casos de uso. También, de esta manera es más\nfácil gastar la cuota de uso de la base de datos, aunque su ampliación sea más\nbarata que Cloud Functions en sí misma.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-16wekeb\">Las consecuencias\u003C/h2> \u003Cp data-svelte-h=\"svelte-1m35tl\">Las consecuencias no fueron más que gotas a un vaso a punto\nde rebosar o leña para una hoguera que comenzaba a arder. En la versión original\nde esta entrada hablaba de una crisis que\nmezcla obsesión, irresponsabilidad afectiva y retraso madurativo a partes\niguales. En los próximos días publicaré algo al respecto. De momento prefiero no mezclar cosas.\u003C/p> \u003Cp data-svelte-h=\"svelte-11wdxif\">Nunca he tenido la intención de usar la acepción de\nhacking como cibercrimen o nada relacionado a seguridad, sino como sobrepasar\nlos límites de una tecnología o técnica para una aplicación mayor o con un uso\nno pensado. Sin embargo, esto sí era un claro bypass a una restricción de\nservicio. De publicarse y popularizarse estoy seguro de que como mínimo\nGoogle habría limitado mucho más a Cloud Functions si ésta\nera una de sus principales características monetizadas.\u003C/p>",relatedPosts:[{title:"Especificación visual. Caso Point it out!",slug:"especificacion-visual-caso-point-it-out",coverImage:"pio-round-fail-test.png",coverAuthor:"",excerpt:"Caso de un proyecto en activo para el que repaso el concepto de regresión visual y especificación visual. Contenido denso.",date:"2024-07-25T15:06:23.177Z",updated:"2024-07-25T15:06:23.903Z",hidden:false,tags:["Front end","TDD/BDD/ATDD"],keywords:["svg","regresión visual","visual testing"],type:"default",coverPosition:"top",path:"/src/posts/especificacion-visual-caso-point-it-out.md",html:"\u003Cp data-svelte-h=\"svelte-kz757p\">He tenido la necesidad de crear formas posicionables sobre sitios web,\nseñalando o conectando elementos. Muchas veces. Es un must en aplicaciones\ninteractivas que requieren de algún tipo de señalización, como podría ocurrir\nen tutoriales.\u003C/p> \u003Cp data-svelte-h=\"svelte-yr62zz\">Harto de reinventar la rueda decido buscar una biblioteca sencillita que me\nresuelva este problema. Esperaba encontrar muchas para ello, o quizás\ncomo alguna feature de alguna muy gorda y conocida.\nEstaba casi convencido de que existiría algo, pero que aún así quizás tendría que\nhacer yo mismo una biblioteca propia con \u003Cstrong>filosofía minimalista\u003C/strong>.\u003C/p> \u003Cp data-svelte-h=\"svelte-1ajb8gz\">Pero lo cierto es que, al menos en unas pocas búsquedas sencillas, no he\nencontrado nada. Que no sea fácil de encontrar no significa que no exista,\nno te imaginas cuántas superherramientas sin visibilidad he encontrado entre\nrepositorios perdidos.\u003C/p> \u003Cp data-svelte-h=\"svelte-10jjd54\">A falta de soluciones (o como resultado de una mala investigación), me pongo\nmanos a la obra en el desarrollo de una biblioteca para ello (Point it out) y\nme doy cuenta de que necesito algo para especificar qué resultado visual busco.\nNecesito alguna técnica de \u003Cstrong>especificación visual\u003C/strong>, si es que existe algo\nasí y si significa lo que pretendo que signifique.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-jzlcfs\">Describiendo el problema: cómo señalizar elementos\u003C/h2> \u003Cp>Por ejemplo, ¿qué podría hacer si quisiera\nseñalizar \u003Cspan class=\"no-wrap svelte-49cqox\">\u003Cspan id=\"example-target\" class=\"hl\" data-svelte-h=\"svelte-tntrd9\">estas palabras\u003C/span>\u003C/span>?\nSi todo funciona bien deberías estar viendo un rectángulo verde sobre las palabras indicadas.\u003C/p> \u003Cp data-svelte-h=\"svelte-h9dgi1\">“Pero Alexander, ¿me estás diciendo que ya existe entonces solución?” No, lo que\nestás viendo es fruto del resultado final (o al menos de lo que ya tengo\ndesarrollado). Dado que ya tengo una medio solución, ¿por qué no mostrarlo?\u003C/p> \u003Cdiv class=\"info-box svelte-16gsg44\"> \u003Cp data-svelte-h=\"svelte-enicy2\">AVISO: ¿Estás buscando un tutorial paso a paso de cómo\ndesarrollar una biblioteca de manera profesional? Pues este NO es el lugar.\nSolo encontrarás fragmentos de código relevantes para plantear el temita\nde la especificación visual.\u003C/p> \u003C/div> \u003Cp data-svelte-h=\"svelte-wn3vay\">En una primera versión, la biblioteca debía aportar al menos un primer mecanismo simple de\nseñalización. Para ello especifiqué la siguiente función:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">create(shape: ShapeName, {target: string | HTMLElement})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-rz0i50\">\u003Ccode>ShapeName\u003C/code> se trata de una string, un tipo de unión ‘rect’ | ‘image’, aunque\nen un primer momento solo existe ‘rect’. La opción target es un selector CSS\no una referencia directa al elemento objetivo.\u003C/p> \u003Cul data-svelte-h=\"svelte-ts57wb\">\u003Cli>Si es un selector, trabajará con el primer elemento que encuentre con ese selector, o lanzará excepción si no encuentra nada.\u003C/li> \u003Cli>Creará un elemento SVG que añadirá como hijo al body.\u003C/li> \u003Cli>Dicho SVG debe estar posicionado absolutamente sobre el elemento a señalar.\u003C/li> \u003Cli>Dicho SVG debe tener un tamaño similar al elemento a señalar.\n\u003Cul>\u003Cli>Digo similar porque podría ser más grande, si quiere rodearse sin taparlo.\u003C/li>\u003C/ul>\u003C/li>\u003C/ul> \u003Cp data-svelte-h=\"svelte-1li2hkb\">En las primeras iteraciones de herramientas gráficas me gusta centrarme en la exploración tecnológica. Hacer un caso mínimo funcional que dé un resultado visual inmediato.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-1cetu9r\">Especificaciones formales con algún framework de testing\u003C/h3> \u003Cp data-svelte-h=\"svelte-nv0msx\">Aquí empieza lo realmente interesante. Hay que testar visualmente, eso está\nclaro, estamos ante una librería cuyo objetivo es renderizar cosas. Pero eso no\nsignifica que inmediatamente todo vaya a ser regresión visual y E2E.\nConsidera la siguiente spec:\u003C/p>  \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">describe('create(...)', ()=>{\n    ...\n    it('creates an SVG and appends it to the body', ()=>{\n        ...\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-86gsr\">Esto no requiere renderizado. Vale con un DOM virtual, comprobar que se crea\nun nuevo nodo y si queda colgando del body. Hacer una prueba E2E para esto es\nmatar moscas a cañonazos.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1jmchc1\">Especificación visual\u003C/h2> \u003Cp data-svelte-h=\"svelte-18ctydr\">Me gusta la \u003Cem>regresión visual\u003C/em>, pero tiene un pequeño problema. Por si no sabes\nde qué te estoy hablando, consiste en la generación y comparación mediante\nsnapshots \u003Cem>(ficheros que describan el estado de una aplicación ante\nciertas condiciones. Típicamente suelen ser screenshots)\u003C/em>. Su fortaleza\nreside en la cobertura futura. Por lo general se\ngeneran snapshots una vez se tiene el resultado buscado para que en futuras\ncomparaciones tras refactoring recibamos un feedback de si algo ha cambiado más\nde lo esperado.\u003C/p> \u003Cp data-svelte-h=\"svelte-13avi2k\">Y aunque es una herramienta útil y bienvenida en mantenimiento de aplicaciones\nque controlan muy bien la interfaz de usuario y donde es crítico que estas no\ncambien inesperadamente, la regresión visual no forma exactamente parte del\nflujo de las metodologías estilo TDD, BDD o ATDD. Recordemos que son\nmetodologías de diseño y \u003Cstrong>la regresión visual no aporta nada en la fase de diseño o para definir especificaciones preimplementación.\u003C/strong>\u003C/p> \u003Ch3 data-svelte-h=\"svelte-1gxnwn7\">Buscando la alternativa a la regresión visual\u003C/h3> \u003Cp>La siguiente forma de proceder y opiniones son, hasta donde sé, de \u003Cspan class=\"no-wrap svelte-49cqox\">Cosexa Pgropia™\u003C/span>. No he hecho una investigación exhaustiva ni\nsé si hay autores que han escrito sobre esto a favor o en contra. Por eso no\nasumas nada de lo que expongo aquí, evita todo prejuicio positivo y afila la\nsospecha y la duda.\u003C/p> \u003Cp data-svelte-h=\"svelte-evd6ah\">El proceso que he realizado es el siguiente: adaptar una biblioteca o framework\ncon capacidades para regresión visual (en este caso Playwright) para que\nen su lugar genere screenshots de dos páginas distintas y\nlas compare. Una de las páginas presenta el escenario donde ejecutas la acción\na probar; la otra es la versión con el resultado final esperado, hecha a mano\ny centrándonos solo en el resultado visual.\u003C/p> \u003Cp data-svelte-h=\"svelte-1usqu0d\">Supongamos la siguiente especificacion:\u003C/p> \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">describe(\"create('rect', {...})\", ()=> {\n    ...\n    describe('Default behaviors (no options)', () => {\n        ...\n        it('creates an orange rect of 4px width around target', ()=>{\n            ...\n        })\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-13cl2ob\">Nuestro escenario de pruebas podría contener, entre otras cosas, lo siguiente:\u003C/p> \u003Cdiv class=\"columns-container svelte-j14ov3\" style=\"--gap: 4px\">\u003Cdiv class=\"columns-container__left svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #e34c26\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">HTML\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-html svelte-lhjmty\">&lt;div class=\"test-box\">&lt;/div>\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003Cdiv class=\"columns-container__right svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #2965f1\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">CSS\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-css svelte-lhjmty\">.test-box {\n    background: #333;\n    width: 250px;\n    height: 150px;\n}\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003C/div> \u003Cdiv class=\"example svelte-1e8u39k\">\u003Cdiv class=\"test-box svelte-1e8u39k\" style=\"width: 250px; height: 150px\">\u003C/div> \u003C/div> \u003Cp data-svelte-h=\"svelte-1pvoef4\">Y por otra parte, una página copia modificada con el resultado VISUAL esperado\u003C/p> \u003Cdiv class=\"columns-container svelte-j14ov3\" style=\"--gap: 4px\">\u003Cdiv class=\"columns-container__left svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #e34c26\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">HTML\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-html svelte-lhjmty\">&lt;div class=\"test-box test-box--expected\">&lt;/div>\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003Cdiv class=\"columns-container__right svelte-j14ov3\">\u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #2965f1\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">CSS\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-css svelte-lhjmty\">...\n.test-box--expected {\n    box-sizing: content-box;\n    border: 4px solid orange;\n}\n\u003C/code>\u003C/pre> \u003C/div>\u003C/div> \u003C/div> \u003Cdiv class=\"example svelte-1e8u39k\">\u003Cdiv class=\"test-box svelte-1e8u39k test-box--expected\" style=\"width: 250px; height: 150px\">\u003C/div> \u003C/div> \u003Cp data-svelte-h=\"svelte-s99gcn\">SÉ LO QUE ESTÁS PENSANDO (o deberías): “pero Alexander, en el esperado no hay\nningún SVG, ¡solo le has puesto un borde naranja de 4 píxeles al elemento!”\u003C/p> \u003Cp data-svelte-h=\"svelte-xp8med\">A esto es a lo que me refiero con especificación visual. Podría haber un SVG\nhecho a mano (de hecho los hay en specs más complejas) y seguiría siendo válido,\npero en realidad no importa la estructura,\nno es lo que estamos especificando ni testando aquí.\u003C/p> \u003Cp data-svelte-h=\"svelte-1qkk97s\">Al igual que con tests convencionales, buscamos la forma menos compleja y más\ndirecta de definir lo que queremos (en este caso lo que queremos visualmente).\u003C/p> \u003Cp data-svelte-h=\"svelte-lro4l7\">Créeme, esto no lo hago por mejorar la adaptabilidad y reducir la fragilidad del\ntest, aunque sean sus efectos positivos principales, sino porque simplemente es la\nforma más sencilla que se me ha ocurrido de conseguir lo que se busca visualmente.\u003C/p> \u003Cp data-svelte-h=\"svelte-1hghbyz\">En una clásica “especificación por ejemplo” con GIVEN-WHEN-THEN, esta parte\ncorrespondería al THEN, y al igual que en las especificaciones convencionales,\ndebe expresarse de la forma más directa y clara atendiendo en este caso\nexclusivamente al resultado visible (ya que es la única responsabilidad en\nestos tests).\u003C/p> \u003Cp data-svelte-h=\"svelte-1n9drh4\">Veamos un test similar al del Mundo Real™. El original y funcional lo tienes\nen el repositorio (enlace al final). Es un test parametrizado, se genera con variaciones de\nexpectedWidth (xW) y expectedHeight (xH).\u003C/p> \u003Cdiv class=\"code-wrapper svelte-lhjmty\" style=\"--lang-color: #3178c6\">\u003Cdiv class=\"code-wrapper__lang svelte-lhjmty\">TypeScript\u003C/div> \u003Cdiv class=\"code-wrapper__buttons svelte-lhjmty\"> \u003C/div> \u003Cpre class=\"svelte-lhjmty\">\u003Ccode class=\"language-typescript svelte-lhjmty\">it(`creates an orange rect of 4px width around target (${xW}x${xH})`, async ({ page }) => {\n    await comparePages({\n        testingURL: `/${xW}x${xH}`,\n        expectedURL: `/expected/rect/${xW}x${xH}-default`,\n        action: () => {\n            return page.evaluate(() => {\n                pio.create('rect', {target: `.test-box--${xW}x${xH}`})\n            })\n        }\n    })\n})\u003C/code>\u003C/pre> \u003C/div> \u003Cp data-svelte-h=\"svelte-1u74y51\">La función es autoexplicativa. Recibe la página donde se ejecutará la acción\na testar, la página con la que comparar, y la acción a realizar. Tras lanzar el\ntest debería fallar al no tener implementación inicialmente.\nEl test report de Playwright en este caso me reporta una comparación de\nmúltiples formas, entre ellas una muy chula con un slider. Captura:\u003C/p> \u003Cdiv class=\"image-wrapper\">\u003Ca href=\"/_app/immutable/assets/captura-error.DS5ipSG-.png\" target=\"_blank\">\u003Cimg src=\"/_app/immutable/assets/captura-error.DS5ipSG-.png\" alt=\"Test report de Playwright mostrando resultado actual y esperado con slider\" class=\"svelte-u0jlpn\">\u003C/a>\u003C/div> \u003Cdiv class=\"info-box svelte-16gsg44\"> Lamentablemente Playwright no tiene una función tan mágica y bonita como\ncomparePages. Es propia, resultado de un poco de \nhacking con los mecanismos de regresión visual de Playwright, pero tienes total\nlibertad para meterle un copia y pega (hazlo del repo, que es la que funciona). \u003C/div> \u003Ch4 data-svelte-h=\"svelte-ftmlr4\">Sólo lo visible\u003C/h4> \u003Cp data-svelte-h=\"svelte-1dxwr9q\">Tengo que insistir en que sólo hago esto con fines de testar el resultado\nvisual. Puede que te preguntes algo como “¿No estás perdiendo la oportunidad\nde especificar directamente un resultado final que sirva también de\nespecificación del DOM deseado para una prueba E2E completa?”\u003C/p> \u003Cp data-svelte-h=\"svelte-1t2sbdi\">No conozco (todavía) el DOM deseado y no puedo \u003Cem>perder tiempo\u003C/em> planificando.\nEsto me permite especificar el\nresultado visual, que es lo único que tengo claro ahora mismo. Además los SVG\npara un mismo objetivo se pueden generar de múltiples maneras. Exagerar el\ndetalle aumenta la rigidez del diseño, no permite posponer decisiones y aumenta\nla fragilidad de los tests.\u003C/p> \u003Cp data-svelte-h=\"svelte-1d5db4w\">Por otra parte también nos limitaría más con escenarios menos deterministas.\nImagina que quieres que el recuadro\nsiga al elemento si este se reposiciona (típico al reescalar pantalla).\nEsto es algo que debe hacer la biblioteca, ¿cómo especificaríamos algo así?\nImplicaría lógica en el propio test. En los expects\nse evitan lógicas complejas a favor de resultados directos deterministas.\nUn borde por CSS no solo está fijado a un elemento, también funciona aunque\nreescales o lo muevas.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-xnqpfg\">Otras preguntas relacionadas que me he planteado\u003C/h3> \u003Cp data-svelte-h=\"svelte-10rlsf7\">¿Por qué hacer un esfuerzo en especificar partes del aspecto visual esperado\nen un desarrollo si muy probablemente haya partes que no\npodremos especificar de todas formas?, ¿no es como intentar construir una casa\nen la que sabemos de antemano que nunca tendremos techo o alguna otra parte\nfundamental?\u003C/p> \u003Cp data-svelte-h=\"svelte-1t9pwnw\">Ya tenemos la respuesta en la jerarquía de tests. Sabemos que las pruebas\nunitarias no nos sirven para todo, ni tampoco las de integración. Pero lo\nhacemos igualmente porque nos guían y cubren el desarrollo, cada una a su\nmanera, con pros y contras. Técnicamente podríamos usar solo tests de aceptación\nsi estos fueran infinitamente rápidos, y aún así, muy probablemente se seguirían\nrealizando pruebas unitarias y de integración junto a ellos.\u003C/p> \u003Cp data-svelte-h=\"svelte-dp70ds\">Puedes tener un muy buen maquetador, diseñador, artista o artista técnico en tu\nequipo durante el desarrollo de una aplicación, con capacidad para\ndiseñar/especificar rápidamente el resultado que quieres pero sin competencias o tiempo\npara realizar la herramienta que produzca ese resultado.\u003C/p> \u003Cp data-svelte-h=\"svelte-hpg0ix\">He conocido empresas que trabajan con un flujo basado en\nprototipos, y eso está perfecto, pero podría ser muy útil entender esos\nprototipos como especificaciones y realizar pruebas directas contra ellos.\u003C/p> \u003Ch3 data-svelte-h=\"svelte-12fyqdo\">¿Cómo de útil es esto realmente?\u003C/h3> \u003Cp data-svelte-h=\"svelte-1lhdzti\">La respuesta es algo evidente: si fuera muy útil habría\nliteratura al respecto y alguna que otra herramienta conocida. Créeme, no soy\nningún genio extendiendo el estado del arte. Esta “técnica”\nviene de perlas para el desarrollo de esta biblioteca en concreto, pero, ¿se\nte ocurre alguna otra? No es especialmente extrapolable. Ni siquiera es\nsuficiente para todos los casos de esta biblioteca.\u003C/p> \u003Cp data-svelte-h=\"svelte-1rh7odk\">Voy a describirte un caso difícil de explicar: imagina que quieres\nseñalizar con una flecha que apunta siempre a un objetivo.\nSupón que incluso aunque este se mueva en pantalla la flecha mantenga su\nposición y gire apuntando siempre al objetivo (un “look at” en gráficos).\u003C/p> \u003Cp data-svelte-h=\"svelte-urr5oj\">La descripción anterior es incluso difícil de imaginar para algunos, supone\nproblemas en cómo especificarla y cómo testarla. Y ni siquiera es algo realmente\ncomplejo. En las artes visuales muchas\nveces no queda más remedio que romper el orden rojo-verde porque el esfuerzo de\nespecificar puede ser indistinguible del de implementar.\u003C/p> \u003Cp data-svelte-h=\"svelte-1appavq\">Es ahí donde destaca la regresión visual clásica. Implementas y cuando estés\nsatisfecho, snapshot que servirá como “expected”. No te habrá servido para\nguiar tu diseño e implementación, pero seguirás protegiendo tu código y\npermitiendo el refactoring.\u003C/p> \u003Cp data-svelte-h=\"svelte-zv5b0r\">Pero no olvides que al final eres tú (o tu equipo) quien decide si cualquier\ntécnica es o no rentable de aplicar en el flujo de trabajo. Incluso aunque\nexistiera garantía de que aplicarlo mejorase la productividad o calidad,\npodría causar el efecto contrario si diezma la moral al percibirse como\nalgo pesado, raro o molesto por mera falta de costumbre. La misma historia\ndel TDD.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-tboj21\">Point it out como posible ejemplo de especificación visual\u003C/h2> \u003Cp data-svelte-h=\"svelte-1yr7544\">Puedes seguir el desarrollo de \u003Ca href=\"https://github.com/alexvgjm/point-it-out\" rel=\"nofollow\">Point it out! en github\u003C/a>,\ndonde verás que hay mucho de lo hablado en este artículo llevado a un\nnivel enfermizo. Es un proyecto pensado para experimentar y debatir\nacerca de las posibilidades de la especificación visual.\u003C/p> \u003Cp data-svelte-h=\"svelte-hh4l2w\">Si clonas y ejecutas el proyecto en modo de desarrollo podrás encontrar una\njerarquía de especificaciones bastante intensa para al menos dos formas y\ndos tamaños de objetivos.\nAquí una screenshot:\u003C/p> \u003Cdiv class=\"image-wrapper\">\u003Ca href=\"/_app/immutable/assets/visual-specs-index.DUyx9Wot.png\" target=\"_blank\">\u003Cimg src=\"/_app/immutable/assets/visual-specs-index.DUyx9Wot.png\" alt=\"\" class=\"svelte-u0jlpn\">\u003C/a>\u003C/div>"},{title:"Por qué un blog en 2024",slug:"por-que-un-blog-en-2024",coverImage:"maquina-escribir.jpg",coverPosition:"normal",coverAuthor:"Patrick Fore",excerpt:"Esta es la primera entrada de un un blog en el que controlo todo su proceso generativo y contenido.",date:"2024-06-24T15:06:23.177Z",updated:"2024-06-24T15:06:23.903Z",hidden:false,tags:["Personal"],keywords:["estático","blog"],type:"default",path:"/src/posts/por-que-un-blog-en-2024.md",html:"\u003Cdiv class=\"info-box svelte-16gsg44\"> En este artículo hablo de blogs de carácter \u003Cstrong data-svelte-h=\"svelte-1kfgueg\">personal\u003C/strong>, \nno de blogs corporativos, institucionales, etc. Esos tienen otras razones para \nseguir siendo útiles. \u003C/div> \u003Cp>Esta es la primera entrada de un blog en el que controlo todo su proceso\ngenerativo y contenido. Detalles\ntécnicos \u003Cspan class=\"no-wrap svelte-49cqox\">\u003Ca href=\"#detalles-tecnicos\" data-svelte-h=\"svelte-alaku3\">👇 al final.\u003C/a>\u003C/span>\u003C/p> \u003Cp data-svelte-h=\"svelte-gel1sl\">Estoy cansado de leer sobre la importancia de dejar por escrito tu oficio o\npensamientos aunque nadie te lea. No le veía sentido práctico y no sentía que\nme ayudara, pero recientemente le he visto dos utilidades.\u003C/p> \u003Cp data-svelte-h=\"svelte-14h9b1d\">La primera, tener un espacio donde compartir lo que suelo repetir con cada\nalumno. Así puedo dejar directamente comentarios, recomendaciones, patrones,\netc., limitándome a mandarles el enlace y no robándoles tiempo en clase.\u003C/p> \u003Cp data-svelte-h=\"svelte-w90q66\">La segunda, más personal y clásica de un blog, es dejar algún rastro de mi\nevolución. Muchas veces he\nintentado recordar sin éxito qué pensaba o qué razones tenía en el pasado para\ndecir o hacer determinadas cosas, como apoyar ciertas corrientes o tecnologías.\nSaber cómo era ayuda a la introspección, a asimiliar y ajustar cambios.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-1dd0thw\">Ventajas de un blog personal en la actualidad\u003C/h2> \u003Cp data-svelte-h=\"svelte-10c8ry6\">Todos conocemos por qué este formato ha muerto. Un blog personal no genera\ndopamina, no está en medio de todo ni te da\nseguidores \u003Csmall>(o no tantos)\u003C/small>. De hecho requiere un esfuerzo para\nmejorar su visibilidad si necesitaras que otros pasen por él. Todo esto puede\nconsiderarse ventajas si lo vemos como un pequeño refugio.\u003C/p> \u003Cp data-svelte-h=\"svelte-18rmamq\">Otra ventaja que surge de la adversidad solo por un cambio de enfoque\nes que hay menos posibilidades de negocio, lo que provoca que un blog personal\nse reduzca por necesidad a su esencia. Actualmente todo internet está saturado\nde contenido basura y autogenerado bien posicionado por magufidades del SEO, por\nlo que la dificultad de posicionar algo aumenta tanto que me disuade y aleja\nde esas ideas de pseudoéxito capitalista.\u003C/p> \u003Cp data-svelte-h=\"svelte-1u3loif\">Al renunciar al posicionamiento, a las visitas e incluso a los comentarios,\nescribir un blog se convierte en una experiencia más personal y limpia. Y lo\nmejor es que me permite realizar aquellas acciones tradicionalmente\nsuperdestructivas y dañinas para el posicionamiento en un sitio normal,\ncomo borrar entradas.\u003C/p> \u003Cp data-svelte-h=\"svelte-gfynom\">Ya desde el primer párrafo que escribes puedes notar algo de no\nestar pululando cerca de una red social: se acabó el que secuestren tu atención,\nel destruir tu productividad con spam de vídeos de gatitos y Milei dando cringe.\u003C/p> \u003Cp data-svelte-h=\"svelte-1owvlqx\">Pero lo mejor de todo es que en este formato tienes el control de tu contenido,\nno hay un servicio que te diga qué puedes o no publicar. Incluso con servicios\nde alojamiento con restricción de contenido o posibilidad de cambiar sus\npolíticas, siempre podrás llevártelo a otro lado. Hoy día, tener el control\nsobre tu contenido es un privilegio.\u003C/p> \u003Ch2 data-svelte-h=\"svelte-5qf7jp\">Por qué no tengo una sección de comentarios\u003C/h2> \u003Cp data-svelte-h=\"svelte-1xwjm58\">Quitando que es un rollo integrar un sistema de comentarios dinámicos externo\nen un sitio estático, cabe aclarar que los comentarios no tienen nada de malo,\nde hecho tienen más pros que contras, pero para mi caso particular pesan más\nlos contras. Mi idea es \u003Cstrong>eliminar la interacción social\u003C/strong> en este espacio (más\nsobre esto en una futura entrada).\u003C/p> \u003Cp data-svelte-h=\"svelte-1obppyr\">Entre las razones más evidentes para no incluirlos está evitarme\ntodo tipo de spam, trolls e incluso comentarios positivos, que solo son alimento\npara el ego. No necesito que quede constancia de si a alguien le gusta o no lo\nque he escrito, aunque con ello se pierda las utilidades más importantes de los\ncomentarios: la obtención de feedback constructivo, correcciones y sugerencias.\u003C/p> \u003Cp data-svelte-h=\"svelte-1e7wgil\">A ver, existe el correo electrónico, pero nadie lo usa\nsalvo que no haya más remedio. Es una vía más directa\npero con algunas desventajas, como la posibilidad de que el correo nunca llegue\ny ni lo sepas.\u003C/p> \u003Cp data-svelte-h=\"svelte-lv4okb\">La razón de peso más típica para incluir comentarios suele estar relacionada con\nel SEO. Los comentarios cuentan como nuevo\ncontenido y pueden atraer visitas por sí mismos. Todo eso me da igual, no busco\nvisibilidad ni posicionamiento con este blog.\u003C/p> \u003Ch2 id=\"detalles-tecnicos\" data-svelte-h=\"svelte-809ml2\">SvelteKit como generador de blogs estáticos\u003C/h2> \u003Cdiv class=\"info-box svelte-16gsg44\"> Esto es un apartado más técnico. Si no te interesa no sé qué haces\nleyendo este blog, para empezar. \u003C/div> \u003Cp data-svelte-h=\"svelte-1c01o13\">No estoy usando ningún framework específico para blogs sino \u003Cstrong>SvelteKit\u003C/strong> como\ngenerador de sitios estáticos, adaptado a mis necesidades.\u003C/p> \u003Cp data-svelte-h=\"svelte-1u01tjt\">Hoy día los sitios estáticos no son ninguna sorpresa. Recuerdo a\nprincipios de milenio cuando la comunidad de php te miraba raro al decir\nde hacer todo en estático, y lo nicho que fue Jekyll hasta que Ruby on Rails\npilló más popularidad.\u003C/p> \u003Cp data-svelte-h=\"svelte-r8zxp3\">Entre 2022 y 2023 comencé un proyecto un poco más ambicioso al que llamé\nSimple Static Blog Generator, fundamentado en TypeScript y MarkDown. Estaba\norientado a experiencia de desarrollo con capa de vista totalmente desacoplada,\nteniendo solo una implementación básica de demostración con pug como sistema\nde templates.\u003C/p> \u003Cp data-svelte-h=\"svelte-avlmxs\">Aunque utilizaba herramientas modernas, integrar con frameworks de SPA,\nreactividad y diseño orientado a componentes era demasiado\nreinventar la rueda. Pensando en rediseñar el sistema sobre Nuxt (Vue),\nconocí Svelte y SvelteKit. El proyecto de Rich Harris me parecía increíble como\npara no darle una oportunidad, y no me arrepiento.\u003C/p> \u003Cp data-svelte-h=\"svelte-10ibczo\">SvelteKit es a Svelte lo que Next a React o Nuxt a Vue, aunque con soporte\noficial; digamos que SvelteKit/Svelte son parte del mismo proyecto\nen manos de la misma comunidad y se desarrollan completamente a la vez.\u003C/p> \u003Cp data-svelte-h=\"svelte-zmfge8\">Quizás seas como yo y no te guste este tipo de frameworks “todo en uno”\nporque, al menos en flujos normales, implica una \u003Csmall>no obligatoria pero\nrecomendada\u003C/small> implementación de back end; pero su modo generador de sitios\nestáticos es con mucho margen la mejor experiencia de desarrollo que he tenido.\u003C/p> \u003Cp data-svelte-h=\"svelte-wmnnp\">Alojar un sitio estático es prácticamente gratuito y apenas consume recursos.\nEl servidor, a fin de cuentas, solo se dedica a enviar ficheros. Existen\ndiversos servicios gratuitos para alojarlo, como Github Pages, donde\njusto está este blog.\u003C/p> \u003Cp data-svelte-h=\"svelte-oa6bid\">En términos de seguridad, los sitios estáticos son más seguros por naturaleza.\nLos ataques de tipo DDoS solo funcionan por saturación de red y no por cómputo,\ndado el esfuerzo mínimo que tiene que hacer el servidor. Esto no evita que se\nagoten las cotas de recursos en servicios de hosting y es crítico\ncuando no se tiene ningún control del backend. En servicios como Pages\ndonde además no se dispone de formas claras de auditar los ataques, solo se\ncomplica, especialmente con capas gratuitas.\u003C/p> \u003Cp>Hay otros beneficios \u003Csmall data-svelte-h=\"svelte-12yc462\">(y contras)\u003C/small>, pero no voy a\ndar \u003Csmall data-svelte-h=\"svelte-ohh2xh\">más\u003C/small> la chapa en esta entrada. Si tienes dudas\nconcretas sobre implementación o quieres hacerte tu propio sitio\nestático con estas tecnologías y no sabes ni por dónde\nempezar \u003Cspan class=\"line-through svelte-kze7de\">déjame un comentario\u003C/span> mándame un correo.\u003C/p>"}]};return {tag:{name:"Back end",posts:a},posts:a}}(Array(1))),"uses":{"params":["slug"]}}];
